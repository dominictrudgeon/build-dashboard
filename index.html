function coachingNotes(today, plan, dayType, todayKey, consumed, targets, latestBW){
  const notes = [];
  const r = state.readiness[todayKey];
  const score = readinessScore(r, state.profile.rhr);
  const wkNum = plan.week?.weekNum;

  // Readiness-driven
  if(score !== null){
    if(score < 50){
      notes.push({label:'Readiness',cls:'red',text:`Readiness ${score}/100 — under 50. Today's session should be cut or moved to mobility/sauna. Push hard now and you delay 3-4 days of recovery (Gabbett 2016).`});
    } else if(score < 65){
      notes.push({label:'Readiness',cls:'amber',text:`Readiness ${score}/100 — caution. Hit prescribed volume but back off intensity. Drop top set weight 5-10% if RPE rises early.`});
    } else if(score >= 80){
      notes.push({label:'Readiness',cls:'green',text:`Readiness ${score}/100 — green light. If today is a quality session, this is your day to push.`});
    }
  } else {
    notes.push({label:'Readiness',text:'No readiness log today. Tap the chip top-right to log sleep, soreness, energy, stress, morning RHR. Takes 30 sec, drives every other recommendation.'});
  }

  // Week-specific
  if(wkNum===1){
    notes.push({label:'Block context',text:'Week 1: altitude suppressing output ~3–5%. HR is your primary metric, ignore pace. Pull-ups baseline AMRAP set Thursday — record honestly, that\'s the number that gets beat in week 3.'});
  } else if(wkNum===2){
    notes.push({label:'Block context',text:'Week 2: first quality session Wednesday. Effort-based, not pace-based. Saturday adds 1mi M-pace at the end of the long run — only the final mile is fast.'});
  } else if(wkNum===3){
    notes.push({label:'Block context',text:'Week 3 is peak — expect fatigue. Threshold session Wednesday at HR 170–175 (2–3 words between breaths). 4×6min. Saturday: 2mi M-pace at end of 12mi long run.'});
  } else if(wkNum===4){
    notes.push({label:'Block context',text:'Deload week: −25% volume. Lift holds load, drops a set. No threshold. Common error: chasing numbers because legs feel fresh. Don\'t — this week consolidates weeks 1–3.'});
  }

  // ACWR
  const acwr = computeACWR(state.running, today);
  if(acwr.chronic > 0){
    if(acwr.ratio > 1.5){
      notes.push({label:'Injury risk',cls:'red',text:`ACWR ${acwr.ratio} — high injury risk. Acute load ${acwr.acute}mi vs chronic ${acwr.chronic}mi. Drop today's volume 30% (Gabbett 2016, BJSM).`});
    } else if(acwr.ratio > 1.3){
      notes.push({label:'Workload',cls:'amber',text:`ACWR ${acwr.ratio} — caution zone. Monitor knee, Achilles, hip flexor sensations closely this week.`});
    }
  }

  // Sleep debt
  const sd = sleepDebt(state.readiness, today);
  if(sd.logged>=3 && sd.debt>5){
    notes.push({label:'Sleep debt',cls:'amber',text:`${sd.debt}h sleep debt over last 7 days. Cumulative deficit performs like 2 nights total deprivation (Van Dongen 2003). Add 30-60 min tonight before chasing PRs.`});
  }

  // Nutrition alignment
  if(consumed.kcal > 100){
    const pct = consumed.kcal/targets.kcal;
    if(dayType !== 'rest' && pct < 0.7){
      notes.push({label:'Fueling',cls:'amber',text:`${Math.round(consumed.kcal)} kcal logged on a ${dayType} day (target ${targets.kcal}). Underfueling on a quality day blunts training adaptation (Burke 2011). Add a carb-rich meal post-workout.`});
    }
    if(consumed.protein < targets.protein*0.7 && new Date().getHours() >= 18){
      notes.push({label:'Protein',cls:'amber',text:`Only ${Math.round(consumed.protein)}g protein by evening (target ${targets.protein}g). Per-meal threshold matters — get a 30g hit before bed (Res 2012 casein) to salvage the day.`});
    }
  }

  // Workout-type-specific protocols
  if(plan.day){
    const types = [plan.day.am?.t, plan.day.pm?.t].filter(Boolean);
    if(types.includes('hsr')){
      notes.push({label:'HSR protocol',text:'HSR: 3s down / 3s up, every rep. Pain VAS up to 4–5/10 OK during loading IF back to baseline by next session (Kongsgaard 2009, Beyer 2015). NO ice bath within 4h after — blunts hypertrophy (Roberts 2015).'});
    }
    if(types.includes('long')){
      notes.push({label:'Long run',text:'Long run: HR primary metric. Walk on uphills if HR creeps. Fuel: 30g carbs at mile 6–7 if >9mi. Post-run within 60min: 1.2 g/kg carbs + 40g protein. Ice bath fine post-run.'});
    }
    if(types.includes('qual')){
      notes.push({label:'Quality session',text:'Quality day at altitude: trust breathing not pace. Sauna AFTER, not ice bath right after lift sessions. Top up carbs pre-session: ~1 g/kg, 1–2h prior.'});
    }
  }

  // Race trajectory positive
  if(wkNum && state.running.length >= 5){
    const recent = state.running.slice(-3);
    notes.push({label:'Trajectory',cls:'green',text:`${state.running.length} runs logged · ${state.lifting.length} lift sessions. Keep the chain unbroken — daily compliance is the lever.`});
  }

  if(notes.length===0){
    notes.push({label:'Note',text:'Log workouts, food, and readiness to get personalized coaching. Everything here is computed from your actual data.'});
  }

  return notes;
}

// TAB: CALENDAR (month grid + phase strip + week mileage)
// =========================================================================
function renderCalendar(){
  // Use ui.calMonth = {y, m} (0-indexed month). Default = current month.
  if (!ui.calMonth) {
    const now = new Date();
    ui.calMonth = {y: now.getFullYear(), m: now.getMonth()};
  }
  const {y, m} = ui.calMonth;
  const monthStart = new Date(y, m, 1);
  const monthEnd = new Date(y, m+1, 0);
  const daysInMonth = monthEnd.getDate();
  // Get day-of-week of the 1st (0=Sun..6=Sat). For Monday-first grid: shift.
  const firstDow = (monthStart.getDay() + 6) % 7; // Monday=0
  const monthLabel = monthStart.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  const todayKey = localDateStr();
  const raceKey = '2026-11-15';

  // Build week-summary array (7-day mileage totals starting Mondays)
  function weekMilesFor(monStr) {
    const ws = parseLocalDate(monStr);
    const we = addDays(ws, 6);
    let m = 0;
    for (const r of state.running) {
      const rd = parseLocalDate(r.date);
      if (rd >= ws && rd <= we) m += +r.distance || 0;
    }
    return +m.toFixed(1);
  }

  // Build cells
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push({empty:true});
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    const key = localDateStr(dt);
    const phase = getPhase(dt);
    const adherence = state.adherence[key];
    const hasRun = state.running.some(r=>r.date===key);
    const hasLift = state.lifting.some(s=>s.date===key);
    const isRace = key === raceKey;
    const isToday = key === todayKey;
    const isPast = key < todayKey;
    cells.push({d, key, dt, phase, adherence, hasRun, hasLift, isRace, isToday, isPast});
  }
  // Pad end to complete the grid
  while (cells.length % 7) cells.push({empty:true});

  const DOWS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Get unique phases visible this month
  const visiblePhases = [...new Set(cells.filter(c=>!c.empty).map(c=>c.phase?.key).filter(Boolean))];

  // Compute weekly totals (group cells into rows, then look up the Monday of each week)
  const weekRows = [];
  for (let i = 0; i < cells.length; i += 7) {
    const row = cells.slice(i, i+7);
    const firstReal = row.find(c=>!c.empty);
    if (!firstReal) { weekRows.push({row, miles:null, target:null}); continue; }
    // Find the Monday of that week
    const mon = addDays(firstReal.dt, -((firstReal.dt.getDay()+6)%7));
    const monKey = localDateStr(mon);
    const miles = weekMilesFor(monKey);
    // Target = phase mileage for that week index
    let target = null;
    const phase = getPhase(mon);
    if (phase) {
      const idx = getWeekInPhase(mon, phase);
      target = phase.mileage[idx];
    }
    weekRows.push({row, miles, target, mon: monKey});
  }

  return `
    <div class="cal-month-header">
      <div class="cal-month-nav" onclick="calStep(-1)">‹ Prev</div>
      <div style="font-weight:600;font-size:15px">${monthLabel}</div>
      <div class="cal-month-nav" onclick="calStep(1)">Next ›</div>
    </div>

    <div class="cal-grid" style="margin-bottom:6px">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
    </div>

    <div style="display:flex;flex-direction:column;gap:3px">
      ${weekRows.map(wr=>`
        <div class="row" style="gap:6px;align-items:stretch">
          <div class="cal-grid" style="flex:1">
            ${wr.row.map(c=>{
              if (c.empty) return '<div class="cal-cell empty"></div>';
              const phaseColor = c.phase?.color || '#444';
              const adhCls = c.adherence?.score >= 80 ? 'adh-good' : c.adherence?.score >= 50 ? 'adh-mid' : c.adherence?.score != null ? 'adh-bad' : '';
              const stateCls = c.isToday ? 'today' : c.isPast ? 'past' : 'future';
              const dot = c.hasRun && c.hasLift ? '◗' : c.hasRun ? '◯' : c.hasLift ? '◆' : '';
              return `<div class="cal-cell ${stateCls} ${adhCls}" onclick="showCalDay('${c.key}')">
                ${c.isRace ? '<div class="race"></div><div class="race-flag">🏁</div>' : ''}
                <div class="row" style="justify-content:space-between;align-items:center">
                  <span class="dn">${c.d}</span>
                  <span class="phase-dot" style="background:${phaseColor}"></span>
                </div>
                <div class="ach">${dot}</div>
              </div>`;
            }).join('')}
          </div>
          <div style="flex:0 0 50px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${wr.miles ?? '–'}</div>
            <div style="font-size:9px;color:var(--text2)">/ ${wr.target ?? '–'} mi</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="phase-legend">
      ${PHASES.filter(p=>visiblePhases.includes(p.key)).map(p=>`<div class="phase-legend-item"><span class="phase-legend-dot" style="background:${p.color}"></span>${p.name}</div>`).join('')}
    </div>

    <div class="card" style="margin-top:14px">
      <h3 class="section-label">Symbols</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11.5px;color:var(--text2);line-height:1.55">
        <div><span style="color:var(--text);font-family:'JetBrains Mono',monospace">◯</span> Run logged</div>
        <div><span style="color:var(--text);font-family:'JetBrains Mono',monospace">◆</span> Lift logged</div>
        <div><span style="color:var(--text);font-family:'JetBrains Mono',monospace">◗</span> Both</div>
        <div><span style="display:inline-block;width:24px;height:3px;background:var(--green);vertical-align:middle;border-radius:1px"></span> Adherence ≥ 80</div>
        <div><span style="display:inline-block;width:24px;height:3px;background:var(--amber);vertical-align:middle;border-radius:1px"></span> 50–79</div>
        <div><span style="display:inline-block;width:24px;height:3px;background:var(--red);vertical-align:middle;border-radius:1px"></span> Below 50</div>
      </div>
    </div>

    <div id="calDayDetail" style="margin-top:12px"></div>
  `;
}

function calStep(delta){
  ui.calMonth.m += delta;
  if (ui.calMonth.m < 0) { ui.calMonth.m = 11; ui.calMonth.y--; }
  if (ui.calMonth.m > 11) { ui.calMonth.m = 0; ui.calMonth.y++; }
  render();
}

function showCalDay(dateKey){
  const dt = parseLocalDate(dateKey);
  const phase = getPhase(dt);
  const plan = todaysPlan(dt);
  const runs = state.running.filter(r=>r.date===dateKey);
  const lifts = state.lifting.filter(s=>s.date===dateKey);
  const adh = state.adherence[dateKey];
  const isRace = dateKey === '2026-11-15';
  const el = document.getElementById('calDayDetail');
  if (!el) return;
  el.innerHTML = `
    <div class="card">
      <div class="row between" style="margin-bottom:8px">
        <h3 class="section-label" style="margin:0">${dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'})}</h3>
        ${isRace ? '<span class="tag" style="background:linear-gradient(135deg,#ef4444 0%,#3b82f6 100%);color:#fff;border:none">RACE DAY</span>' : ''}
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
        ${phase ? `Phase: <span style="color:${phase.color}">${phase.name}</span> · Week ${getWeekInPhase(dt,phase)+1}/${phase.weeks}` : 'Outside training block'}
      </div>
      ${plan.day ? `
        <div style="margin-bottom:10px">
          ${plan.day.am ? `<div style="font-size:12px;margin-bottom:4px"><strong>AM:</strong> ${plan.day.am.title}</div>` : ''}
          ${plan.day.pm ? `<div style="font-size:12px"><strong>PM:</strong> ${plan.day.pm.title}</div>` : ''}
        </div>
      ` : ''}
      ${runs.length ? `<div style="margin-bottom:8px"><div class="section-label">Runs logged</div>${runs.map(r=>`<div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2)">${r.type} · ${r.distance}mi · ${r.time?Math.floor(r.time)+'min':''} ${r.pace?'· '+r.pace+'/mi':''} ${r.hr?'· HR '+r.hr:''}</div>`).join('')}</div>` : ''}
      ${lifts.length ? `<div style="margin-bottom:8px"><div class="section-label">Lifts logged</div>${lifts.flatMap(s=>s.sets.map(set=>`<div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2)">${set.exercise} ${set.weight}×${set.reps}${set.rpe?' @ RPE '+set.rpe:''}</div>`)).join('')}</div>` : ''}
      ${adh ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div style="font-size:12px"><strong>Adherence:</strong> ${adh.score}/100 — prescribed ${adh.prescribed}, actual ${adh.actual||'?'}</div>${adh.reason ? `<div style="font-size:11px;color:var(--text2);margin-top:3px">${adh.reason}</div>`:''}</div>` : ''}
      ${!runs.length && !lifts.length && !plan.day ? '<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px 0">No activity</div>' : ''}
    </div>
  `;
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderWorkout(){
  return `
    <div class="subtabs">
      <div class="subtab ${ui.workoutSub==='lift'?'active':''}" onclick="setWorkoutSub('lift')">Lift</div>
      <div class="subtab ${ui.workoutSub==='run'?'active':''}" onclick="setWorkoutSub('run')">Run</div>
    </div>
    ${ui.workoutSub==='lift' ? renderLift() : renderRun()}
  `;
}

function renderLift(){
  const today = new Date();
  const plan = todaysPlan(today);
  const preselect = ui.preselectExercise || '';
  ui.preselectExercise = null;

  // Today's prescribed lifts
  let prescribed = [];
  if(plan.day){
    for(const s of [plan.day.am, plan.day.pm]){
      if(s?.exercises) prescribed.push(...s.exercises);
    }
  }

  // Session preview
  const cs = state.currentSession?.sets || [];

  // History — last 6 dates of lifting
  const sessionsByDate = {};
  for(const s of state.lifting){
    sessionsByDate[s.date] = sessionsByDate[s.date] || [];
    sessionsByDate[s.date].push(s);
  }
  const recentDates = Object.keys(sessionsByDate).sort().reverse().slice(0,6);

  // RPE suggestion for preselected
  let suggestion = null;
  if(preselect){
    const lastForEx = [...state.lifting].reverse().find(l=>l.exercise===preselect);
    if(lastForEx){
      suggestion = suggestNextWeight(preselect, lastForEx.sets);
    }
  }

  return `
    ${(() => {
      // Muscle freshness card
      const fresh = muscleFreshness(today);
      return `<div class="card" style="margin-bottom:10px">
        <h3 class="section-label">Muscle freshness</h3>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:5px">
          ${MUSCLE_DISPLAY.map(([g, label, color]) => {
            const f = fresh[g];
            if (!f) return '';
            const pct = Math.round(f.freshness * 100);
            const barColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
            return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 7px">
              <div class="row between" style="margin-bottom:3px;align-items:center">
                <span style="font-size:11px;color:var(--text)">${label}</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:${barColor};font-weight:600">${pct}%</span>
              </div>
              <div style="height:3px;background:var(--surface3);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};transition:width .3s"></div></div>
            </div>`;
          }).join('')}
        </div>
        <div style="font-size:10.5px;color:var(--text2);margin-top:8px;line-height:1.5">
          Per-group volume × exponential decay (small τ=30-36hrs, large τ=60-72hrs). <strong style="color:var(--text)">Hit anything &lt; 50%</strong> and you're working into incomplete recovery. <span style="color:var(--muted);font-style:italic">— Schoenfeld 2016/2017</span>
        </div>
      </div>`;
    })()}
    ${prescribed.length ? `
    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Today's prescribed</h3>
      ${prescribed.map(e=>`<div class="exer" onclick="fillWorkoutLog('${e.name.replace(/'/g,"\\'")}')">
        <div class="ex-body">
          <div class="ex-title">${e.name}</div>
          <div class="ex-prescription">${e.sets}×${e.reps}${e.weight?` @ ${e.weight}${typeof e.weight==='number'?'lb':''}`:''}${e.note?` · ${e.note}`:''}</div>
        </div>
      </div>`).join('')}
    </div>` : ''}

    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Log set</h3>
      ${suggestion ? `<div class="insight" style="margin-bottom:10px"><div class="lbl">RPE suggestion · ${preselect}</div>Last session avg RPE ${suggestion.avgRPE}. ${suggestion.action==='add'?`Try ${suggestion.weight}lb today (+${suggestion.weight - (state.lifting.find(l=>l.exercise===preselect)?.sets.slice(-1)[0].weight||0)}lb).`:suggestion.action==='+1 rep'?`Hold ${suggestion.weight}lb, add 1 rep per set.`:`Drop to ${suggestion.weight}lb — last session was too heavy.`}</div>`:''}
      <div class="field" style="margin-bottom:8px"><label>Exercise</label>
        <select id="liftExercise">${EXERCISES.map(e=>`<option ${e===preselect?'selected':''}>${e}</option>`).join('')}</select>
      </div>
      <div class="grid3" style="margin-bottom:8px">
        <div class="field"><label>Reps</label><input type="number" id="liftReps" placeholder="5" class="num"></div>
        <div class="field"><label>Weight (lb)</label><input type="number" id="liftWeight" placeholder="205" step="2.5" class="num"></div>
        <div class="field"><label>RPE</label><input type="number" id="liftRPE" placeholder="7" min="1" max="10" step="0.5" class="num"></div>
      </div>
      <button class="btn full" onclick="addSet()">+ Add set to session</button>
      ${cs.length ? `
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
        <div class="section-label" style="margin-bottom:6px">Current session (${cs.length} set${cs.length>1?'s':''})</div>
        ${cs.map((s,i)=>`<div class="set-tile">${s.exercise} · ${s.reps}×${s.weight}lb @ RPE${s.rpe||'-'} <span style="color:var(--muted);margin-left:4px;cursor:pointer" onclick="removeSet(${i})">×</span></div>`).join('')}
        <button class="btn primary full" style="margin-top:10px" onclick="saveSession()">Save session</button>
      </div>` : ''}
    </div>

    ${recentDates.length ? `
    <div class="card">
      <h3 class="section-label">Recent sessions</h3>
      ${recentDates.map(d=>{
        const sessions = sessionsByDate[d];
        return `<div style="padding:9px 0;border-bottom:1px solid var(--border)">
          <div class="row between" style="margin-bottom:6px">
            <span style="font-size:12px;color:var(--text2)">${fmtDate(parseLocalDate(d))}</span>
            <span style="font-size:11px;color:var(--muted)">${sessions.reduce((a,s)=>a+s.sets.length,0)} sets</span>
          </div>
          ${sessions.map(s=>`
            <div style="margin-bottom:6px">
              <div style="font-size:12px;font-weight:500;margin-bottom:3px">${s.exercise}</div>
              ${s.sets.map(set=>{
                const is1rm = set.weight && set.reps && e1rm(set.weight,set.reps) === (state.prs[s.exercise]?.e1rm||0);
                return `<span class="set-tile ${is1rm?'pr':''}">${set.reps}×${set.weight}${typeof set.weight==='number'?'':''}@${set.rpe||'-'}</span>`;
              }).join('')}
            </div>
          `).join('')}
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

function addSet(){
  const ex = document.getElementById('liftExercise').value;
  const reps = +document.getElementById('liftReps').value;
  const weight = +document.getElementById('liftWeight').value;
  const rpe = +document.getElementById('liftRPE').value;
  if(!ex || !reps || !weight){ showToast('Need exercise, reps, weight'); return; }
  state.currentSession.sets.push({exercise:ex, reps, weight, rpe});
  saveState();
  document.getElementById('liftReps').value='';
  document.getElementById('liftWeight').value='';
  document.getElementById('liftRPE').value='';
  render();
}
function removeSet(i){
  state.currentSession.sets.splice(i,1);
  saveState();
  render();
}
function saveSession(){
  const sets = state.currentSession.sets;
  if(!sets.length) return;
  // Group by exercise
  const byEx = {};
  for(const s of sets){
    byEx[s.exercise] = byEx[s.exercise] || [];
    byEx[s.exercise].push({reps:s.reps, weight:s.weight, rpe:s.rpe});
  }
  const date = localDateStr();
  for(const ex of Object.keys(byEx)){
    state.lifting.push({id:Date.now()+Math.random(), date, exercise:ex, sets:byEx[ex]});
    // PR check
    for(const set of byEx[ex]){
      const er = e1rm(set.weight, set.reps);
      if(!state.prs[ex] || er > state.prs[ex].e1rm){
        state.prs[ex] = {weight:set.weight, reps:set.reps, e1rm:er, timestamp:Date.now()};
        showToast(`PR! ${ex}: ${set.weight}×${set.reps} = ${er}lb e1RM`);
      }
    }
  }
  state.currentSession = {sets:[]};
  recomputeAdherence(date);
  saveState();
  render();
}

function renderRun(){
  const today = new Date();
  const plan = todaysPlan(today);
  let runRx = null;
  if(plan.day){
    if(['easy','long','qual'].includes(plan.day.am?.t)) runRx = plan.day.am;
    else if(['easy','long','qual'].includes(plan.day.pm?.t)) runRx = plan.day.pm;
  }
  const recent = [...state.running].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);

  return `
    ${runRx ? `<div class="card" style="margin-bottom:10px">

function formatPace(minPerMi){
  if(!minPerMi || !isFinite(minPerMi)) return '-';
  const m = Math.floor(minPerMi);
  const s = Math.round((minPerMi-m)*60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function addRun(){
  const date = document.getElementById('runDate').value;
  const type = document.getElementById('runType').value;
  const distance = +document.getElementById('runDist').value;
  const time = +document.getElementById('runTime').value;
  const hr = +document.getElementById('runHR').value;
  if(!date || !distance){ showToast('Need date and distance'); return; }
  const pace = time && distance ? formatPace(time/distance) : null;
  state.running.push({id:Date.now()+Math.random(), date, type, distance, time, hr, pace, source:'manual'});
  recomputeAdherence(date);
  saveState();
  render();
  showToast('Run logged');
}

// Recompute adherence for a given date based on what's logged
function recomputeAdherence(dateKey) {
  const dt = parseLocalDate(dateKey);
  const plan = todaysPlan(dt);
  if (!plan.day) { delete state.adherence[dateKey]; return; }
  const session = plan.day.am || plan.day.pm; // primary session
  const dayLifts = state.lifting.filter(s => s.date === dateKey).flatMap(s => s.sets);
  const dayRuns = state.running.filter(r => r.date === dateKey);
  const a = computeDayAdherence(dateKey, session, dayLifts, dayRuns);
  if (a) state.adherence[dateKey] = a;
}

function importCSV(){
  const f = document.getElementById('csvFile').files[0];
  if(!f){ showToast('No file selected'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const text = e.target.result;
      const {runs, diag} = parseRunCSV(text);
      // Always log diagnostics so we can see what happened
      console.log('[CSV Import Diagnostics]', diag);
      let imported = 0, skipped = 0;
      const datesTouched = new Set();
      for(const run of runs){
        const dup = state.running.find(r => r.date===run.date && Math.abs((+r.distance||0)-(+run.distance||0))<0.15);
        if(dup){ skipped++; continue; }
        state.running.push({id:Date.now()+Math.random()*1e6, ...run});
        datesTouched.add(run.date);
        imported++;
      }
      datesTouched.forEach(d => recomputeAdherence(d));
      saveState();
      render();
      // Show diagnostic info if nothing imported
      if(imported===0 && skipped===0){
        const msg = `0 imported. Found ${diag.totalRows} rows, ${diag.runRows} runs, ${diag.dateOk} valid dates, ${diag.distOk} valid distances. Headers detected: date=${diag.di}, dist=${diag.disi}, time=${diag.ti}. See console for details.`;
        showToast(msg, 8000);
        alert(msg + '\n\nFirst row sample:\n' + diag.firstRowSample);
      } else {
        showToast(`Imported ${imported} runs · ${skipped} skipped (unit detected: ${diag.distUnit})`, 5000);
      }
    }catch(err){
      console.error(err);
      showToast('CSV parse failed: ' + err.message, 6000);
    }
  };
  reader.readAsText(f);
}

// Flexible date parser — handles ISO, US slash, EU dot, and "Mon DD, YYYY" formats
function parseFlexibleDate(s){
  if(!s) return null;
  s = s.trim();
  // ISO: 2024-01-15 or 2024-01-15T14:30:00
  let m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  // US slash: 01/15/2024
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  // EU dot: 15.01.2024
  m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  // Strava bulk format: "Aug 6, 2024, 10:35:23 AM" or "Aug 6, 2024"
  const monthMap = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  m = s.match(/([A-Za-z]{3,9})\s+(\d{1,2}),?\s+(\d{4})/);
  if(m){
    const mo = monthMap[m[1].toLowerCase().slice(0,3)];
    if(mo) return `${m[3]}-${mo}-${String(m[2]).padStart(2,'0')}`;
  }
  // DD Mon YYYY: "6 Aug 2024"
  m = s.match(/(\d{1,2})\s+([A-Za-z]{3,9})\s+(\d{4})/);
  if(m){
    const mo = monthMap[m[2].toLowerCase().slice(0,3)];
    if(mo) return `${m[3]}-${mo}-${String(m[1]).padStart(2,'0')}`;
  }
  // Fallback: native Date.parse
  const d = new Date(s);
  if(!isNaN(d.getTime())){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return null;
}

function parseRunCSV(text){
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const firstLine = text.split('\n')[0];
  const delim = firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
  const lines = text.split('\n').filter(l=>l.trim());
  const diag = {totalRows:0, runRows:0, dateOk:0, distOk:0, headers:[], firstRowSample:'', distUnit:'?', di:-1, disi:-1, ti:-1};
  if(lines.length<2) return {runs:[], diag};
  const headers = parseCSVLine(lines[0], delim).map(h=>h.trim().toLowerCase());
  diag.headers = headers;
  const colIdx = name => headers.findIndex(h=>h.includes(name));
  const ai = colIdx('activity type') !== -1 ? colIdx('activity type') : colIdx('type');
  const di = colIdx('date');
  // Prefer columns with explicit units, fall back to plain "distance"
  let disi = headers.findIndex(h=>/^distance\s*\(km\)/.test(h));
  if(disi===-1) disi = headers.findIndex(h=>/^distance\s*\(mi/.test(h));
  if(disi===-1) disi = headers.findIndex(h=>/^distance\s*\(m\)/.test(h));
  if(disi===-1) disi = colIdx('distance');
  // Prefer moving time over elapsed time for pace accuracy
  let ti = colIdx('moving time');
  if(ti===-1) ti = colIdx('elapsed time');
  if(ti===-1) ti = colIdx('time');
  const hri = colIdx('avg hr') !== -1 ? colIdx('avg hr') :
              colIdx('average heart rate') !== -1 ? colIdx('average heart rate') :
              colIdx('heart rate');
  diag.di = di; diag.disi = disi; diag.ti = ti;
  // Detect distance unit from header explicitly, otherwise sample magnitudes
  let distUnit = 'mi';
  if(disi>=0){
    const h = headers[disi];
    if(/\(km\)/i.test(h)) distUnit = 'km';
    else if(/\(m\)|\(meters?\)/i.test(h)) distUnit = 'm';
    else if(/\(mi/i.test(h)) distUnit = 'mi';
    else {
      // Sample first 10 valid distances to guess unit
      const samples = [];
      for(let i=1;i<lines.length && samples.length<10;i++){
        const row = parseCSVLine(lines[i], delim);
        const v = parseFloat((row[disi]||'').replace(',','.'));
        if(v>0) samples.push(v);
      }
      if(samples.length){
        const avg = samples.reduce((a,b)=>a+b,0)/samples.length;
        const max = Math.max(...samples);
        if(max > 1000) distUnit = 'm';      // meters
        else if(avg > 8) distUnit = 'km';    // km (typical run 5-15 km)
        else distUnit = 'mi';                // miles
      }
    }
  }
  diag.distUnit = distUnit;
  if(lines.length>=2) diag.firstRowSample = lines[1].slice(0,200);
  const out = [];
  for(let i=1;i<lines.length;i++){
    diag.totalRows++;
    const f = parseCSVLine(lines[i], delim);
    const actType = ai>=0 ? (f[ai]||'').toLowerCase() : 'run';
    // Allow run, trail run, virtual run, etc.
    if(ai>=0 && actType && !actType.includes('run')) continue;
    diag.runRows++;
    const date = parseFlexibleDate(f[di]||'');
    if(!date) continue;
    diag.dateOk++;
    let dist = parseFloat((f[disi]||'').replace(',','.'));
    if(!dist || isNaN(dist)) continue;
    diag.distOk++;
    // Convert to miles based on detected unit
    if(distUnit==='km') dist = dist * 0.621371;
    else if(distUnit==='m') dist = dist / 1609.34;
    // Time — hh:mm:ss, mm:ss, or raw seconds
    let time = 0;
    const ts = (f[ti]||'').trim();
    if(ts.includes(':')){
      const parts = ts.split(':').map(Number);
      if(parts.length===3) time = parts[0]*60 + parts[1] + parts[2]/60;
      else if(parts.length===2) time = parts[0] + parts[1]/60;
    } else if(ts){
      const n = parseFloat(ts);
      if(!isNaN(n)) time = n>500 ? n/60 : n;
    }
    const hr = hri>=0 ? (+f[hri] || null) : null;
    const pacePerMi = time && dist ? time/dist : null;
    let type;
    if(dist > 9) type='Long';
    else if(pacePerMi && pacePerMi < 7.5) type='Tempo';
    else type='Easy';
    out.push({date, type, distance:+dist.toFixed(2), time:+time.toFixed(1), hr, pace:pacePerMi?formatPace(pacePerMi):null, source:'csv'});
  }
  return {runs:out, diag};
}
function parseCSVLine(line, delim){
  const out = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c === '"'){
      if(inQ && line[i+1]==='"'){ cur+='"'; i++; }
      else inQ = !inQ;
    } else if(c === delim && !inQ){
      out.push(cur); cur = '';
    } else cur += c;
  }
  out.push(cur);
  return out;
}

function renderHydration(weightKg, todayKey) {
  // Estimate training hours from today's plan + actual logged runs
  const todayPlan = todaysPlan(new Date());
  let plannedHours = 0;
  if (todayPlan.day) {
    if (todayPlan.day.am) plannedHours += 1; // rough
    if (todayPlan.day.pm) plannedHours += 1;
  }
  const target = hydrationTarget(weightKg, plannedHours);
  const total = todayHydrationMl(todayKey);
  const pct = Math.min(100, Math.round(total / target * 100));
  const day = state.hydration[todayKey];
  const entries = day?.entries || [];

  // last 7 days
  const trend = [];
  for (let i = 6; i >= 0; i--) {
    const d = addDays(new Date(), -i);
    const k = localDateStr(d);
    const t = (state.hydration[k]?.entries || []).reduce((s,e)=>s+(+e.ml||0), 0);
    const dt = hydrationTarget(weightKg, 1);
    trend.push({k, ml: t, target: dt, pct: dt > 0 ? Math.min(100, t/dt*100) : 0, dow: d.toLocaleDateString('en-US',{weekday:'narrow'})});
  }

  return `
    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Today · ${total}ml / ${target}ml</h3>
      <div class="bar" style="height:10px;margin-bottom:8px"><div style="width:${pct}%;background:${pct>=85?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}"></div></div>
      <div style="font-size:12px;color:var(--text2)">Base: ${Math.round(weightKg)} kg × ${state.settings.hydrationBaseMlPerKg} ml/kg = ${Math.round(weightKg*state.settings.hydrationBaseMlPerKg)} ml. + ${plannedHours}h training × ${state.settings.hydrationPerTrainHr} ml = ${plannedHours*state.settings.hydrationPerTrainHr} ml.</div>
      <div class="hyd-quick">
        <button onclick="logHydration(250)">+250 ml<br><span style="font-size:9px;color:var(--text2)">cup</span></button>
        <button onclick="logHydration(500)">+500 ml<br><span style="font-size:9px;color:var(--text2)">bottle</span></button>
        <button onclick="logHydration(750)">+750 ml<br><span style="font-size:9px;color:var(--text2)">L bottle</span></button>
        <button onclick="logCustomHydration()">Custom</button>
      </div>
    </div>

    ${entries.length ? `<div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Today's entries</h3>
      ${entries.slice().reverse().map((e,i)=>`<div class="row between" style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace">
        <div>${e.when}</div>
        <div>${e.ml} ml<span class="mdel" onclick="delHydration(${entries.length-1-i})" style="margin-left:10px">×</span></div>
      </div>`).join('')}
    </div>` : ''}

    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Last 7 days</h3>
      <div class="adh-bar">
        ${trend.map(t=>`<div class="adh-day ${t.pct>=85?'good':t.pct>=50?'mid':t.ml>0?'bad':'skip'}" title="${t.dow} ${t.k}: ${t.ml}ml"></div>`).join('')}
      </div>
      <div class="row" style="margin-top:4px;justify-content:space-between;font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace">
        ${trend.map(t=>`<div style="flex:1;text-align:center">${t.dow}</div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h3 class="section-label">Why this matters</h3>
      <div style="font-size:12px;color:var(--text2);line-height:1.55">
        Performance drops 2-3% per 1% bodyweight lost to sweat. Cardiovascular drift, thermoregulation impairment, glycogen sparing all worsen with dehydration. <strong style="color:var(--text)">Altitude (5,300ft) increases insensible water loss 30-50%</strong> — your base may need to climb until you descend to Madison in late August.
      </div>
    </div>
  `;
}

// ===== Food search and DB-driven meal logging =====
let _foodSearchDebounce = null;
let _foodSearchSelected = null; // currently selected food item

function onFoodSearchInput() {
  clearTimeout(_foodSearchDebounce);
  const input = document.getElementById('foodSearchInput');
  const results = document.getElementById('foodSearchResults');
  const q = input.value.trim();
  if (q.length < 2) {
    results.style.display = 'none';
    results.innerHTML = '';
    return;
  }
  // Instant local results
  const local = searchFoods(q, {limit: 12});
  renderFoodSearchResults(local, /*loading=*/false);
  // Debounced USDA fetch if local results are thin
  if (local.length < 8) {
    _foodSearchDebounce = setTimeout(async () => {
      const usdaResults = await searchUSDA(q, 15);
      // Merge: local first, then USDA (already cached)
      const merged = searchFoods(q, {limit: 20});
      // If USDA returned new items, they're now in cache and will appear
      renderFoodSearchResults(merged.length ? merged : usdaResults.slice(0,15), false);
    }, 350);
  }
}

function renderFoodSearchResults(items, loading) {
  const results = document.getElementById('foodSearchResults');
  if (!results) return;
  if (!items.length) {
    results.innerHTML = `<div class="food-result" style="cursor:default;color:var(--text2)">${loading?'Searching…':'No matches. Try fewer/simpler words.'}</div>`;
    results.style.display = 'block';
    return;
  }
  results.innerHTML = items.map(f => {
    const src = f.i.startsWith('usda_') ? 'USDA' : f.i.startsWith('custom_') ? 'custom' : '';
    return `<div class="food-result" onclick="selectFood('${f.i}')">
      <span class="src">${src}</span>
      <div class="nm">${f.n}${f.upf?'<span class="upf-flag">UPF</span>':''}</div>
      <div class="mc">${f.sa}${f.su} · ${f.k}kcal · ${f.p}P · ${f.c2}C · ${f.f}F${f.fi?` · ${f.fi}fib`:''}${f.na?` · ${f.na}mg Na`:''}</div>
    </div>`;
  }).join('');
  results.style.display = 'block';
}

function selectFood(id) {
  const food = getFoodById(id);
  if (!food) { showToast('Food not found in cache'); return; }
  _foodSearchSelected = food;
  document.getElementById('foodSearchResults').style.display = 'none';
  document.getElementById('foodSearchInput').value = food.n;
  const sel = document.getElementById('foodSelected');
  sel.style.display = 'block';
  sel.innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:500;margin-bottom:2px">${food.n}${food.upf?'<span class="upf-flag" style="margin-left:6px">UPF</span>':''}</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Base serving: ${food.sa}${food.su} · ${food.k} kcal · ${food.p}P · ${food.c2}C · ${food.f}F</div>
      <div class="row" style="gap:8px;align-items:center">
        <label style="font-size:11px;color:var(--text2);flex-shrink:0">Amount</label>
        <input id="foodAmount" type="number" class="num" value="${food.sa}" step="any" style="flex:1" oninput="updateFoodPreview()">
        <span style="font-size:12px;color:var(--text2);flex-shrink:0">${food.su}</span>
      </div>
      <div id="foodPreview" style="font-size:11px;color:var(--text);margin-top:8px;padding:6px 8px;background:var(--surface);border-radius:6px;font-family:'JetBrains Mono',monospace"></div>
      <button class="btn primary full" style="margin-top:8px" onclick="addFoodFromDB()">Add to log</button>
    </div>
  `;
  updateFoodPreview();
}

function updateFoodPreview() {
  if (!_foodSearchSelected) return;
  const amount = +document.getElementById('foodAmount').value || 0;
  const scaled = scaleFood(_foodSearchSelected, amount);
  const preview = document.getElementById('foodPreview');
  if (preview) {
    preview.innerHTML = `${scaled.kcal} kcal · ${scaled.protein}g P · ${scaled.carbs}g C · ${scaled.fat}g F${scaled.fiber?' · '+scaled.fiber+'g fiber':''}${scaled.sodium?' · '+scaled.sodium+'mg Na':''}`;
  }
}

function addFoodFromDB() {
  if (!_foodSearchSelected) return;
  const amount = +document.getElementById('foodAmount').value || 0;
  if (amount <= 0) { showToast('Enter an amount'); return; }
  const scaled = scaleFood(_foodSearchSelected, amount);
  const key = localDateStr();
  state.nutrition[key] = state.nutrition[key] || {meals:[]};
  state.nutrition[key].meals.push({
    name: `${_foodSearchSelected.n} (${amount}${_foodSearchSelected.su})`,
    kcal: scaled.kcal,
    protein: scaled.protein,
    carbs: scaled.carbs,
    fat: scaled.fat,
    fiber: scaled.fiber,
    sodium: scaled.sodium,
    upf: scaled.upf,
    foodId: _foodSearchSelected.i
  });
  _foodSearchSelected = null;
  saveState();
  render();
  showToast('Food added');
}

function renderReport(){
  const today = new Date();
  const todayKey = localDateStr(today);
  const weekStart = addDays(today, -((today.getDay()+6)%7));
  const plan = todaysPlan(today);

  // Weekly summary
  const weekRuns = state.running.filter(r=>{const d=parseLocalDate(r.date); return d>=weekStart && d<=today;});
  const weekLifts = state.lifting.filter(s=>{const d=parseLocalDate(s.date); return d>=weekStart && d<=today;});
  const weekMiles = weekRuns.reduce((a,r)=>a+(+r.distance||0),0);
  const weekVol = weekLifts.reduce((a,s)=>a+s.sets.reduce((b,set)=>b+(+set.weight||0)*(+set.reps||0),0),0);
  const liftSessions = new Set(weekLifts.map(s=>s.date)).size;
  const avgPace = weekRuns.length ? weekRuns.reduce((a,r)=>{const p=r.time&&r.distance?r.time/r.distance:0; return a+p;},0)/weekRuns.length : 0;
  // habit completion past 7d
  let habTotal = 0, habDone = 0;
  for(let i=0;i<7;i++){
    const d = addDays(today,-i);
    const h = state.habits[localDateStr(d)] || {};
    for(const k of ['sleep','diet','exercise','mobility','screen','skin']){
      habTotal++; if(h[k]) habDone++;
    }
  }
  const habitPct = Math.round(habDone/habTotal*100);
  // readiness avg
  let rSum=0, rCount=0;
  for(let i=0;i<7;i++){
    const d = addDays(today,-i);
    const r = state.readiness[localDateStr(d)];
    const sc = readinessScore(r, state.profile.rhr);
    if(sc!==null){ rSum+=sc; rCount++; }
  }
  const avgReady = rCount ? Math.round(rSum/rCount) : null;

  // ACWR
  const acwr = computeACWR(state.running, today);
  let acwrZone = 'optimal', acwrCls = 'green';
  if(acwr.chronic <= 0){ acwrZone='no data'; acwrCls=''; }
  else if(acwr.ratio < 0.8){ acwrZone='undertraining'; acwrCls='amber'; }
  else if(acwr.ratio > 1.5){ acwrZone='HIGH RISK'; acwrCls='red'; }
  else if(acwr.ratio > 1.3){ acwrZone='caution'; acwrCls='amber'; }

  // Sleep debt
  const sd = sleepDebt(state.readiness, today);

  // Race trajectory
  const traj = projectVDOT(state.profile.vdot, 0, state.running);
  const projFinish = vdotToMarathon(traj.projected);

  // 1RM projections (8 wk linear regression)
  const liftProj = [];
  const byExercise = {};
  for(const s of state.lifting){
    byExercise[s.exercise] = byExercise[s.exercise] || [];
    const best = Math.max(...s.sets.map(set=>e1rm(set.weight,set.reps)));
    byExercise[s.exercise].push({t:parseLocalDate(s.date).getTime(), e1rm:best});
  }
  for(const ex of Object.keys(byExercise)){
    const data = byExercise[ex].sort((a,b)=>a.t-b.t);
    if(data.length<3) continue;
    // linear regression
    const n = data.length;
    const t0 = data[0].t;
    const xs = data.map(d=>(d.t-t0)/(86400000*7)); // weeks
    const ys = data.map(d=>d.e1rm);
    const sumX = xs.reduce((a,b)=>a+b,0);
    const sumY = ys.reduce((a,b)=>a+b,0);
    const sumXY = xs.reduce((a,x,i)=>a+x*ys[i],0);
    const sumXX = xs.reduce((a,x)=>a+x*x,0);
    const slope = (n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX);
    const intercept = (sumY - slope*sumX)/n;
    const current = ys[ys.length-1];
    const proj8 = Math.round(intercept + slope*(xs[xs.length-1]+8));
    const stalled = Math.abs(slope) < 0.5 && data.length >= 3;
    liftProj.push({ex, current, slope:+slope.toFixed(1), proj8, stalled, sessions:data.length});
  }
  liftProj.sort((a,b)=>b.current-a.current);

  // Insights engine
  const insights = generateInsights(today, acwr, sd, liftProj, weekMiles, plan, weekRuns);

  // PRs
  const prs = Object.entries(state.prs).map(([ex,p])=>({ex,...p})).sort((a,b)=>b.e1rm-a.e1rm);

  return `
    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Weekly summary</h3>
      <div class="grid2">
        <div class="metric"><div class="l">Lift sessions</div><div class="v">${liftSessions} <span style="color:var(--text2);font-size:13px;font-weight:400">/ 4</span></div></div>
        <div class="metric"><div class="l">Run miles</div><div class="v">${weekMiles.toFixed(1)} <span style="color:var(--text2);font-size:13px;font-weight:400">/ ${plan.week?.miles||0}</span></div></div>
        <div class="metric"><div class="l">Total volume</div><div class="v">${(weekVol/1000).toFixed(1)}<span style="font-size:12px;color:var(--text2);font-weight:400;margin-left:2px">k lb</span></div></div>
        <div class="metric"><div class="l">Avg pace</div><div class="v">${avgPace?formatPace(avgPace):'–'}<span style="font-size:12px;color:var(--text2);font-weight:400;margin-left:2px">/mi</span></div></div>
        <div class="metric"><div class="l">Habits</div><div class="v">${habitPct}<span style="font-size:12px;color:var(--text2);font-weight:400;margin-left:2px">%</span></div></div>
        <div class="metric"><div class="l">Readiness avg</div><div class="v">${avgReady??'–'}</div></div>
      </div>
    </div>

    ${(()=>{
      // Workout adherence card (Seiler 80/20)
      const wAdh = weeklyAdherence(weekStart, today);
      // 14-day trend (for adherence bar)
      const trend = [];
      let hardCount=0, easyCount=0, hardHit=0, easyHit=0;
      for (let i = 13; i >= 0; i--) {
        const d = addDays(today, -i);
        const k = localDateStr(d);
        const a = state.adherence[k];
        const dow = d.toLocaleDateString('en-US',{weekday:'narrow'});
        if (!a) { trend.push({k, dow, cls:'skip', score:null}); continue; }
        const cls = a.score >= 80 ? 'good' : a.score >= 50 ? 'mid' : 'bad';
        trend.push({k, dow, cls, score:a.score, prescribed:a.prescribed});
        if (a.prescribed === 'hard') { hardCount++; if (a.score >= 80) hardHit++; }
        else if (a.prescribed === 'easy') { easyCount++; if (a.score >= 80) easyHit++; }
      }
      return `<div class="card" style="margin-bottom:10px">
        <h3 class="section-label">Workout adherence · Seiler 80/20</h3>
        <div class="grid2" style="margin-bottom:8px">
          <div class="metric"><div class="l">Week score</div><div class="v" style="color:${wAdh===null?'var(--text2)':wAdh>=80?'var(--green)':wAdh>=60?'var(--amber)':'var(--red)'}">${wAdh??'–'}${wAdh!==null?'<span style="font-size:12px;color:var(--text2);font-weight:400">%</span>':''}</div></div>
          <div class="metric"><div class="l">14d easy stayed easy</div><div class="v">${easyCount?Math.round(easyHit/easyCount*100):'–'}<span style="font-size:12px;color:var(--text2);font-weight:400">%</span><div class="d">${easyHit}/${easyCount}</div></div></div>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Last 14 days</div>
        <div class="adh-bar">
          ${trend.map(t=>`<div class="adh-day ${t.cls}" title="${t.dow} ${t.k}: ${t.score!==null?t.score+' ('+t.prescribed+')':'no data'}"></div>`).join('')}
        </div>
        <div class="row" style="margin-top:4px;justify-content:space-between;font-size:9px;color:var(--text2);font-family:'JetBrains Mono',monospace">
          ${trend.map(t=>`<div style="flex:1;text-align:center">${t.dow}</div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:8px;line-height:1.5">
          Easy-day adherence is the leading indicator. <strong style="color:var(--text)">Going too hard on easy days</strong> blunts aerobic adaptation more than skipping a hard day. <cite>(Seiler 2010, Stöggl 2014)</cite>
        </div>
      </div>`;
    })()}

    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">ACWR · injury risk</h3>
      <div class="row between" style="margin-bottom:8px">
        <div class="metric"><div class="l">Acute (7d)</div><div class="v">${acwr.acute}<span style="font-size:12px;color:var(--text2);margin-left:2px;font-weight:400">mi</span></div></div>
        <div class="metric"><div class="l">Chronic (28d avg)</div><div class="v">${acwr.chronic}<span style="font-size:12px;color:var(--text2);margin-left:2px;font-weight:400">mi</span></div></div>
        <div class="metric"><div class="l">Ratio</div><div class="v" style="color:${acwrCls==='red'?'var(--red)':acwrCls==='amber'?'var(--amber)':'var(--green)'}">${acwr.ratio}</div></div>
      </div>
      <div class="insight ${acwrCls}"><div class="lbl">Zone · ${acwrZone}</div>ACWR &lt;0.8 undertraining · 0.8–1.3 optimal · 1.3–1.5 caution · &gt;1.5 high risk. <cite>(Gabbett 2016, BJSM — 2–4× injury risk above 1.5)</cite></div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <h3 class="section-label">Sleep debt · 7-day</h3>
      <div class="row between" style="margin-bottom:6px">
        <div class="metric"><div class="l">Cumulative debt</div><div class="v" style="color:${sd.debt>5?'var(--amber)':'var(--text)'}">${sd.debt}<span style="font-size:13px;color:var(--text2);font-weight:400;margin-left:2px">h</span></div></div>
        <div class="metric"><div class="l">Nights logged</div><div class="v">${sd.logged}<span style="font-size:13px;color:var(--text2);font-weight:400;margin-left:2px">/7</span></div></div>
      </div>
      <div style="font-size:11.5px;color:var(--text2);line-height:1.5">Cumulative restriction performs like 2 nights total deprivation past ~5h (Van Dongen 2003).</div>
    </div>

    ${(() => {
      // PMC card — Banister CTL/ATL/TSB with taper forecast
      const pmc = computePMC(today, 90);
      const taper = forecastTaperStart(state.profile.raceDate, pmc.ctl, pmc.atl);
      const tsbColor = pmc.tsb > 10 ? 'var(--green)' : pmc.tsb > -10 ? 'var(--text)' : pmc.tsb > -25 ? 'var(--amber)' : 'var(--red)';
      const tsbLabel = pmc.tsb > 25 ? 'detrained' : pmc.tsb > 10 ? 'fresh' : pmc.tsb > -10 ? 'neutral' : pmc.tsb > -25 ? 'fatigued' : 'deeply fatigued';
      return `<div class="card" style="margin-bottom:10px">
        <h3 class="section-label">Performance management · Banister model</h3>
        <div class="row" style="gap:10px;margin-bottom:10px">
          <div class="metric" style="flex:1"><div class="l">Fitness (CTL)</div><div class="v">${pmc.ctl.toFixed(0)}</div><div class="d">42-day load</div></div>

          <div class="metric" style="flex:1"><div class="l">Form (TSB)</div><div class="v" style="color:${tsbColor}">${pmc.tsb>0?'+':''}${pmc.tsb.toFixed(0)}</div><div class="d">${tsbLabel}</div></div>
        </div>
        <div class="chart-wrap"><canvas id="pmcChart"></canvas></div>
        ${taper ? `<div style="margin-top:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Taper forecast (race ${state.profile.raceDate})</div>
          <div style="font-size:13px;color:var(--text);font-weight:500">Start taper <strong style="color:var(--green)">${taper.taperStart.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</strong> · ${taper.taperDays}-day taper</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">Projected race-day TSB: <strong style="color:${taper.raceTSB>15?'var(--green)':'var(--amber)'}">+${taper.raceTSB.toFixed(0)}</strong> (target +15 to +25)</div>

    ${liftProj.length ? `<div class="card" style="margin-bottom:10px">

function generateInsights(today, acwr, sd, liftProj, weekMiles, plan, weekRuns){
  const out = [];

  if(acwr.chronic > 0){
    if(acwr.ratio > 1.5) out.push({cls:'red', label:'Injury risk', text:`ACWR ${acwr.ratio} — 2-4× injury risk zone. Drop 30% running volume this week. (Gabbett 2016 BJSM)`});
    else if(acwr.ratio < 0.8 && acwr.chronic > 5) out.push({cls:'amber', label:'Undertraining', text:`ACWR ${acwr.ratio} — chronic load not maintained. Add easy miles to rebuild base.`});
  }
  if(sd.debt > 5 && sd.logged >= 3) out.push({cls:'amber', label:'Recovery deficit', text:`Sleep debt ${sd.debt}h over ${sd.logged} nights. Fix sleep before chasing performance gains. (Van Dongen 2003; Leproult 2011: <6h sleep → 14% ↓T)`});

  // Easy run HR check
  const easyRuns = state.running.filter(r=>r.type==='Easy' && r.hr).slice(-5);
  if(easyRuns.length >= 3){
    const avgEasyHR = easyRuns.reduce((a,r)=>a+r.hr,0)/easyRuns.length;
    if(avgEasyHR > 155) out.push({cls:'amber', label:'Running easy too hard', text:`Avg easy HR ${Math.round(avgEasyHR)} over last ${easyRuns.length} runs — above 150. Slow down. Polarized training (Stöggl 2014) needs 80% truly easy.`});
  }

  // Recent lift RPE
  const recentLifts = state.lifting.slice(-10);
  const allRPE = recentLifts.flatMap(s=>s.sets.map(set=>set.rpe).filter(Boolean));
  if(allRPE.length >= 6){
    const avgRPE = allRPE.reduce((a,b)=>a+b,0)/allRPE.length;
    if(avgRPE > 8.5) out.push({cls:'amber', label:'Deload needed', text:`Avg RPE ${avgRPE.toFixed(1)} over recent sessions — fatigue accumulating. Drop top set weight 10% or skip a session.`});
  }

  // Mileage vs plan
  if(plan.week?.miles){
    const dayOfWeek = (today.getDay()+6)%7; // 0=Mon..6=Sun
    const expected = (dayOfWeek+1)/7 * plan.week.miles;
    const ratio = weekMiles/expected;
    if(dayOfWeek >= 3 && ratio < 0.7) out.push({cls:'amber', label:'Behind on mileage', text:`${weekMiles.toFixed(1)}/${plan.week.miles}mi logged by ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][dayOfWeek]}. Trending ${Math.round(ratio*100)}% of target.`});
    if(weekMiles > plan.week.miles*1.15) out.push({cls:'red', label:'Overshooting plan', text:`${weekMiles.toFixed(1)}mi vs ${plan.week.miles}mi target (${Math.round(weekMiles/plan.week.miles*100)}%). Stop adding miles — diminishing returns past plan.`});
  }

  // Stalled lifts
  for(const p of liftProj){
    if(p.stalled) out.push({cls:'amber', label:`${p.ex} stalled`, text:`No measurable progress over ${p.sessions} sessions. Try: deload week, change rep range, or evaluate recovery.`});
  }

  // Habit consistency
  let habDone=0, habTotal=0;
  for(let i=0;i<7;i++){
    const h = state.habits[localDateStr(addDays(today,-i))] || {};
    for(const k of ['sleep','diet','exercise','mobility','screen','skin']){ habTotal++; if(h[k]) habDone++; }
  }
  if(habTotal>0){
    const pct = habDone/habTotal;
    if(pct < 0.5) out.push({cls:'amber', label:'Habit consistency low', text:`${Math.round(pct*100)}% over 7 days. Compliance is the lever — supplements, programs, training plans are downstream of this.`});
    else if(pct > 0.85) out.push({cls:'green', label:'Habits solid', text:`${Math.round(pct*100)}% habit compliance this week. Keep it.`});
  }

  // PRs in last 14 days
  const recentPRs = Object.values(state.prs).filter(p=>(Date.now()-p.timestamp) < 14*86400000).length;
  if(recentPRs >= 2) out.push({cls:'green', label:'Progressing', text:`${recentPRs} PRs in last 14 days. Working stimulus, recovering well.`});

  return out;
}

// ===== Push notifications =====
function urlBase64ToUint8Array(b64) {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

async function enableNotifications() {
  if (!state.settings.pushWorkerUrl) { showToast('Set worker URL first', 4000); return; }
  if (!state.settings.vapidPublicKey) { showToast('Set VAPID public key first', 4000); return; }
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Push not supported in this browser', 4000); return;
  }
  if (!window.IS_PWA && /iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    if (!confirm('iOS requires the app to be installed to home-screen for push to work. Continue anyway?')) return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { showToast('Permission denied', 4000); return; }
    state.notif = state.notif || {};
    state.notif.enabled = true;

    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(state.settings.vapidPublicKey)
    });

    // Detect timezone offset
    state.notif.prefs.tz = -new Date().getTimezoneOffset(); // minutes east of UTC
    state.notif.prefs.enabled = true;

    const resp = await fetch(state.settings.pushWorkerUrl.replace(/\/$/,'') + '/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({subscription: sub.toJSON(), prefs: state.notif.prefs})
    });
    if (!resp.ok) throw new Error('Worker returned ' + resp.status);
    state.notif.subscribed = true;
    state.notif.endpoint = sub.endpoint;
    saveState();
    render();
    showToast('Push notifications enabled', 4000);
  } catch (e) {
    console.error('enableNotifications', e);
    showToast('Failed: ' + e.message, 6000);
  }
}

async function disableNotifications() {
  if (!confirm('Disable notifications? You can re-enable anytime.')) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      const endpoint = sub.endpoint;
      await sub.unsubscribe();
      await fetch(state.settings.pushWorkerUrl.replace(/\/$/,'') + '/unsubscribe', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({endpoint})
      });
    }
    state.notif.subscribed = false;
    state.notif.enabled = false;
    state.notif.endpoint = null;
    saveState();
    render();
    showToast('Push notifications disabled');
  } catch (e) {
    console.error(e);
    showToast('Failed: ' + e.message, 4000);
  }
}

async function testNotification() {
  if (!state.notif?.endpoint) { showToast('Not subscribed'); return; }
  try {
    const resp = await fetch(state.settings.pushWorkerUrl.replace(/\/$/,'') + '/test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({endpoint: state.notif.endpoint})
    });
    const data = await resp.json();
    if (data.ok) showToast('Test sent — check notifications', 4000);
    else showToast('Test failed: ' + (data.error || data.status), 5000);
  } catch (e) {
    showToast('Test failed: ' + e.message, 5000);
  }
}

          <input type="checkbox" ${r.enabled?'checked':''} onchange="setNotifPref('${key}','enabled',this.checked)"> ${label}
        </label>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)">
          <input type="number" min="0" max="23" value="${r.h}" style="width:38px;padding:3px 5px;font-size:11px" onchange="setNotifPref('${key}','h',+this.value)">:<input type="number" min="0" max="59" value="${String(r.m).padStart(2,'0')}" style="width:38px;padding:3px 5px;font-size:11px" onchange="setNotifPref('${key}','m',+this.value)">
        </div>
      </div>
    </div>`;
  };
  return `
    <div style="margin-top:6px">
      <div class="row between" style="margin-bottom:6px">
        <span style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Reminder schedule</span>
        <button class="btn sm" onclick="syncNotifPrefs()">Sync to server</button>
      </div>
      ${row('morning', 'Morning check-in')}
      ${row('preAm', 'Pre-AM fuel')}
      ${row('postAm', 'Post-AM recovery')}
      ${row('prePm', 'Pre-PM fuel')}
      ${row('postPm', 'Post-PM recovery')}
      ${row('evening', 'Evening review')}
    </div>
  `;
}

function recomputeAllAdherence(){
  state.adherence = {};
  const dates = new Set([
    ...state.running.map(r=>r.date),
    ...state.lifting.map(s=>s.date)
  ]);
  dates.forEach(d => recomputeAdherence(d));
  saveState();
  render();
  showToast(`Recomputed adherence for ${dates.size} days`);
}
function setProfile(k,v){ state.profile[k]=v; saveState(); }
function setBaseline(k,v){ state.baselines[k]=v; saveState(); }
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `recon_v10_${localDateStr()}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 100);
}
function importData(f){
  if(!f) return;
  if(!confirm('Replace ALL data with this file?')) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      state = {...defaultState(), ...parsed};
      saveState();
      render();
      showToast('Data imported');
    }catch(err){ showToast('Invalid JSON'); }
  };
  reader.readAsText(f);
}
function resetData(){
  if(!confirm('Delete ALL data permanently? Cannot be undone.')) return;
  if(!confirm('Really? This wipes lifting, running, nutrition, habits, readiness, PRs.')) return;
  localStorage.removeItem('reconV10');
  state = defaultState();
  saveState();
  render();
  showToast('Reset');
}

// =========================================================================
// READINESS MODAL
// =========================================================================
function openReadiness(){
  const key = localDateStr();
  const r = state.readiness[key] || {sleepHours:7.5, sleepQuality:7, soreness:3, energy:7, stress:4, rhr:state.profile.rhr};
  state.readiness[key] = r;
  // Get HRV baseline for live z-score display
  const hrvHistory = recentReadinessValues('hrv', new Date(), 7);
  const hrvStats = rollingStats(hrvHistory);
  const baselineText = hrvStats.mean !== null
    ? `7d baseline: ${hrvStats.mean.toFixed(0)} ± ${(hrvStats.sd||0).toFixed(0)} ms`
    : `Logging your first HRV — baseline builds after 5+ days`;
  document.getElementById('modal').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeReadiness()">
      <div class="modal">
        <div class="row between" style="margin-bottom:14px">
          <h3 style="margin:0;font-size:15px;font-weight:600">Morning check-in</h3>
          <span style="font-size:18px;color:var(--text2);cursor:pointer" onclick="closeReadiness()">×</span>
        </div>

        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Garmin morning report</div>
          <div class="grid2" style="margin-bottom:6px">
            <div class="field"><label>HRV (ms) <span id="hrvZScore" style="float:right;font-size:10px;color:var(--text2)"></span></label><input type="number" id="r_hrv" class="num" value="${r.hrv||''}" placeholder="e.g. 65" oninput="updateHRVZScore()"></div>
            <div class="field"><label>Resting HR</label><input type="number" id="r_rhr" class="num" value="${r.rhr||state.profile.rhr}" placeholder="${state.profile.rhr}"></div>
          </div>
          <div style="font-size:10px;color:var(--text2);line-height:1.4">${baselineText} · From Garmin Connect → Health Stats → HRV Status (or daily summary).</div>
        </div>

        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Subjective markers</div>
        ${rSlider('Sleep hours', 'sleepHours', 0, 12, 0.5, r.sleepHours)}
        ${rSlider('Sleep quality (1=poor, 10=great)', 'sleepQuality', 1, 10, 1, r.sleepQuality)}
        ${rSlider('Soreness (1=none, 10=wrecked)', 'soreness', 1, 10, 1, r.soreness)}
        ${rSlider('Energy (1=zombie, 10=charged)', 'energy', 1, 10, 1, r.energy)}
        ${rSlider('Stress (1=calm, 10=fried)', 'stress', 1, 10, 1, r.stress)}

        <button class="btn primary full" style="margin-top:10px" onclick="saveReadiness()">Submit</button>
      </div>
    </div>
  `;
  // Compute initial z-score if HRV already entered
  setTimeout(updateHRVZScore, 0);
}
function updateHRVZScore(){
  const el = document.getElementById('hrvZScore');
  const inp = document.getElementById('r_hrv');
  if (!el || !inp) return;
  const val = +inp.value;
  if (!val) { el.textContent = ''; el.style.color='var(--text2)'; return; }
  const hist = recentReadinessValues('hrv', new Date(), 7);
  const stats = rollingStats(hist);
  if (stats.mean === null || stats.sd === null) { el.textContent = 'building…'; el.style.color='var(--text2)'; return; }
  const z = (val - stats.mean) / stats.sd;
  let color = 'var(--green)';
  if (z < -1.0) color = 'var(--red)';
  else if (z < -0.5) color = 'var(--amber)';
  el.textContent = (z >= 0 ? '+' : '') + z.toFixed(2) + ' SD';
  el.style.color = color;
}
function rSlider(label, k, min, max, step, val){
  return `<div class="slider-row">
    <div class="row between"><span style="color:var(--text2);font-size:12px">${label}</span><span class="v" id="rv-${k}">${val}</span></div>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" oninput="updateRSlider('${k}',this.value)">
  </div>`;
}
function updateRSlider(k, v){
  const key = localDateStr();
  state.readiness[key][k] = +v;
  document.getElementById('rv-'+k).textContent = v;
}
function saveReadiness(){
  const key = localDateStr();
  state.readiness[key].rhr = +document.getElementById('r_rhr').value || state.profile.rhr;
  const hrv = +document.getElementById('r_hrv').value;
  if(hrv) state.readiness[key].hrv = hrv;
  saveState();
  closeReadiness();
  render();
  showToast('Readiness logged · prescription updated');
}
function closeReadiness(){ document.getElementById('modal').innerHTML = ''; }

// =========================================================================
// TOAST
// =========================================================================
let toastTimer;
function showToast(msg, duration){
  const t = document.getElementById('toast');
  t.innerHTML = `<div class="toast">${msg}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{t.innerHTML='';}, duration || 2400);
}

// =========================================================================
// INIT
// =========================================================================
render();

// PWA: register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered, scope:', reg.scope))
      .catch(err => console.warn('SW registration failed (this is OK if running from file://):', err.message));
  });
}

// Detect if running as installed PWA vs browser
window.IS_PWA = window.matchMedia('(display-mode: standalone)').matches ||
                window.navigator.standalone === true;

</script>
</body>
</html>
