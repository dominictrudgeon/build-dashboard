<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Top course: 2 bricks, alternating bond -->
  <rect x="86"  y="138" width="170" height="68" rx="6" fill="#c2410c" stroke="#9a3412" stroke-width="2"/>
  <rect x="268" y="138" width="158" height="68" rx="6" fill="#c2410c" stroke="#9a3412" stroke-width="2"/>
  <rect x="86"  y="138" width="170" height="14" rx="6" fill="#ea580c" opacity="0.4"/>
  <rect x="268" y="138" width="158" height="14" rx="6" fill="#ea580c" opacity="0.4"/>
  <!-- Middle course: 1 full brick offset -->
  <rect x="86" y="218" width="340" height="68" rx="6" fill="#9a3412" stroke="#7c2d12" stroke-width="2"/>
  <rect x="86" y="218" width="340" height="14" rx="6" fill="#c2410c" opacity="0.4"/>
  <!-- Bottom course: 2 bricks (mirror of top) -->
  <rect x="86"  y="298" width="158" height="68" rx="6" fill="#c2410c" stroke="#9a3412" stroke-width="2"/>
  <rect x="256" y="298" width="170" height="68" rx="6" fill="#c2410c" stroke="#9a3412" stroke-width="2"/>
  <rect x="86"  y="298" width="158" height="14" rx="6" fill="#ea580c" opacity="0.4"/>
  <rect x="256" y="298" width="170" height="14" rx="6" fill="#ea580c" opacity="0.4"/>
  <!-- Wordmark -->
  <text x="256" y="438" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="12" text-anchor="middle" fill="#f2f2f2">BUILD</text>
</svg>
