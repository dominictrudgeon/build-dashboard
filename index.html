<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Build">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Build</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a0a; --surface:#141414; --surface2:#1c1c1c; --surface3:#232323;
  --border:#262626; --border2:#2e2e2e;
  --text:#f2f2f2; --text2:#8a8a8a; --muted:#555;
  --blue:#3b82f6; --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --purple:#a78bfa;
  --shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 4px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior:none}
body{padding-bottom:calc(78px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top);min-height:100vh}
.num{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:-.01em;font-variant-numeric:tabular-nums}

/* layout */
.app{max-width:480px;margin:0 auto;padding:14px 14px 14px}
.row{display:flex;align-items:center;gap:10px}
.row.between{justify-content:space-between}
.row.wrap{flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hide{display:none!important}

/* header */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px}
.brand{font-weight:600;font-size:15px;letter-spacing:-.01em}
.brand span{color:var(--text2);font-weight:500;margin-left:5px;font-size:12px}

/* readiness chip */
.ready{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 5px;cursor:pointer;transition:border-color .15s}
.ready:active{transform:scale(.97)}
.ready .ring{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.ready .lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:500}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
.card.dense{padding:10px 12px}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:500;margin:0 0 8px}
h3.section-label{margin:0 0 8px}
.metric{display:flex;flex-direction:column;gap:2px}
.metric .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.15}
.metric .l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.metric .d{font-size:11px;color:var(--text2);margin-top:1px;font-family:'JetBrains Mono',monospace}
.metric .d.pos{color:var(--green)}
.metric .d.neg{color:var(--red)}

/* buttons & inputs */
.btn{font-family:inherit;font-size:13px;font-weight:500;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 13px;cursor:pointer;min-height:38px;transition:background .15s,border-color .15s}
.btn:hover{background:var(--surface3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{color:var(--red);border-color:#3a1717}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px;min-height:30px}
.btn.full{width:100%}
input[type=text],input[type=number],input[type=date],input[type=file],select,textarea{font-family:inherit;font-size:14px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 11px;outline:none;width:100%;min-height:38px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input.num,input.num-input{font-family:'JetBrains Mono',monospace}
label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:5px;display:block}
.field{display:flex;flex-direction:column}
.toggle{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;font-size:12px;color:var(--text2);text-align:center;transition:all .15s;user-select:none}
.toggle.on{background:#0d2a4c;border-color:var(--blue);color:#dbeafe}
.toggle:active{transform:scale(.97)}

/* sub-tab pills */
.subtabs{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:12px}
.subtab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);border-radius:7px;cursor:pointer;transition:all .15s}
.subtab.active{background:var(--surface3);color:var(--text)}

/* progress bars */
.bar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;position:relative}
.bar>div{height:100%;background:var(--blue);transition:width .25s ease;border-radius:99px}
.bar.green>div{background:var(--green)}
.bar.amber>div{background:var(--amber)}
.bar.red>div{background:var(--red)}
.bar.purple>div{background:var(--purple)}
.macro-row{margin-bottom:8px}
.macro-row:last-child{margin-bottom:0}
.macro-row .row{margin-bottom:4px;font-size:12px}
.macro-row .v{font-family:'JetBrains Mono',monospace;font-weight:500}

/* exercise/workout cards */
.exer{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.exer:active{transform:scale(.99)}
.exer .check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.exer.done .check{background:var(--green);border-color:var(--green)}
.exer.done .check::after{content:'✓';color:#fff;font-size:13px;font-weight:600}
.exer.done .ex-title{color:var(--text2)}
.exer .ex-body{flex:1;min-width:0}
.exer .ex-title{font-size:13px;font-weight:500;margin-bottom:3px}
.exer .ex-prescription{font-size:11px;color:var(--text2);line-height:1.5}

/* session tags */
.tag{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:5px;border:1px solid;line-height:1.4}
.tag.easy{color:#86efac;border-color:#1f3b27;background:#0b1f10}
.tag.qual{color:#fbbf24;border-color:#3d2a0b;background:#1f1505}
.tag.long{color:#93c5fd;border-color:#1c3458;background:#0a1830}
.tag.push{color:#fca5a5;border-color:#3e1a1a;background:#1f0a0a}
.tag.pull{color:#cbd5e1;border-color:#262626;background:#161616}
.tag.hsr{color:#fdba74;border-color:#3a2412;background:#1d100b}
.tag.rest{color:#a3a3a3;border-color:#262626;background:#161616}
.tag.cross{color:#c4b5fd;border-color:#2b1f4f;background:#150e2a}

/* habit tiles */
.habit{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 8px;text-align:center;cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s;user-select:none}
.habit.done{background:#0a1f10;border-color:#1f3b27;color:#86efac}
.habit:active{transform:scale(.96)}
.habit .icon{font-size:16px;display:block;margin-bottom:3px}

/* insight boxes */
.insight{padding:10px 12px;border-radius:0 8px 8px 0;background:var(--surface2);border-left:2px solid var(--blue);font-size:12.5px;line-height:1.55;margin-bottom:8px}
.insight.green{border-left-color:var(--green)}
.insight.amber{border-left-color:var(--amber);background:#1d1606}
.insight.red{border-left-color:var(--red);background:#1f0a0a}
.insight .lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:3px}
.insight cite{color:var(--text2);font-style:normal;font-size:11px}

/* bottom nav */
.nav{position:fixed;left:8px;right:8px;bottom:calc(8px + env(safe-area-inset-bottom));background:rgba(20,20,20,.92);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);border:1px solid var(--border);border-radius:14px;display:flex;justify-content:space-around;padding:5px;z-index:50;max-width:464px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:9px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;transition:all .15s;letter-spacing:.02em}
.nav-btn .ic{font-size:17px;line-height:1}
.nav-btn.active{background:var(--surface3);color:var(--text)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-weight:500;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--border)}
td{padding:7px 8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace}
tr:last-child td{border-bottom:none}
td.text{font-family:inherit}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:18px 14px 24px;animation:slideUp .25s cubic-bezier(.16,1,.3,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* slider */
.slider-row{margin-bottom:14px}
.slider-row .row{margin-bottom:5px;align-items:baseline}
.slider-row .v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;height:24px}
input[type=range]::-webkit-slider-runnable-track{height:5px;background:var(--surface3);border-radius:99px}
input[type=range]::-moz-range-track{height:5px;background:var(--surface3);border-radius:99px;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:18px;width:18px;border-radius:50%;background:var(--blue);margin-top:-6px;border:2px solid var(--text)}
input[type=range]::-moz-range-thumb{height:18px;width:18px;border-radius:50%;background:var(--blue);border:2px solid var(--text)}

/* toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 16px;border-radius:99px;z-index:200;animation:slideUpToast .25s ease}
@keyframes slideUpToast{from{transform:translate(-50%,30px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

/* meal items */
.meal{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.meal .mname{flex:1;font-size:13px;min-width:0}
.meal .mname .sub{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.meal .mdel{font-size:11px;color:var(--muted);cursor:pointer;padding:4px 8px}
.meal .mdel:hover{color:var(--red)}

/* set tiles in workout history */
.set-tile{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--surface2);border:1px solid var(--border);padding:3px 7px;border-radius:5px;margin:2px}
.set-tile.pr{background:#0a1f10;border-color:#1f3b27;color:#86efac}

/* report sections */
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.report-row:last-child{border-bottom:none}
.report-row .l{color:var(--text2)}
.report-row .v{font-family:'JetBrains Mono',monospace;font-weight:500}

/* chart wrapper */
.chart-wrap{position:relative;height:180px;margin-top:6px}

/* reference panel */
.ref-cat{padding:9px 0;border-bottom:1px solid var(--border)}
.ref-cat:last-child{border-bottom:none}
.ref-cat .title{font-size:13px;font-weight:500;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.ref-cat .tier{font-size:10px;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.ref-cat .tier.a{background:#0a1f10;color:#86efac;border:1px solid #1f3b27}
.ref-cat .tier.b{background:#1d1606;color:#fbbf24;border:1px solid #3d2a0b}
.ref-cat .tier.c{background:#1f0a0a;color:#fca5a5;border:1px solid #3e1a1a}
.ref-cat .desc{font-size:11.5px;color:var(--text2);line-height:1.55}

/* Streak chips & consistency ring */
.streak-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.streak-row::-webkit-scrollbar{display:none}
.streak-chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;min-width:64px}
.streak-chip .v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;line-height:1.1;color:var(--text)}
.streak-chip .v.cold{color:var(--muted)}
.streak-chip .v.warm{color:#fbbf24}
.streak-chip .v.hot{color:#22c55e}
.streak-chip .l{font-size:9.5px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.consistency-ring{display:flex;align-items:center;gap:10px}
.consistency-ring .num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--text)}
.consistency-ring .sub{font-size:11px;color:var(--text2)}

/* Calendar */
.cal-month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-month-nav{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;color:var(--text2);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{aspect-ratio:1;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;cursor:pointer;position:relative;overflow:hidden}
.cal-cell.today{border-color:var(--blue);border-width:2px;padding:2px 3px}
.cal-cell.past{opacity:.6}
.cal-cell.future{opacity:.85}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell .dn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text)}
.cal-cell .phase-dot{width:6px;height:6px;border-radius:50%}
.cal-cell .ach{font-size:9px;color:var(--text2);font-family:'JetBrains Mono',monospace;line-height:1}
.cal-cell .race{position:absolute;inset:0;background:linear-gradient(135deg,#ef4444 0%,#3b82f6 100%);opacity:.25}
.cal-cell .race-flag{font-size:14px;line-height:1;position:absolute;top:2px;right:3px}
.cal-cell.adh-good::after{content:'';position:absolute;bottom:2px;left:2px;right:2px;height:2px;background:var(--green);border-radius:1px}
.cal-cell.adh-mid::after{content:'';position:absolute;bottom:2px;left:2px;right:2px;height:2px;background:var(--amber);border-radius:1px}
.cal-cell.adh-bad::after{content:'';position:absolute;bottom:2px;left:2px;right:2px;height:2px;background:var(--red);border-radius:1px}
.phase-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:11px;color:var(--text2)}
.phase-legend-item{display:flex;align-items:center;gap:5px}
.phase-legend-dot{width:8px;height:8px;border-radius:50%}

/* Food search */
.food-search-wrap{position:relative}
.food-search-results{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:280px;overflow-y:auto;z-index:30;box-shadow:0 4px 12px rgba(0,0,0,.6)}
.food-result{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.food-result:last-child{border-bottom:none}
.food-result:hover,.food-result.sel{background:var(--surface3)}
.food-result .nm{color:var(--text);font-weight:500}
.food-result .mc{font-size:10.5px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace}
.food-result .upf-flag{display:inline-block;background:#3e1a1a;color:#fca5a5;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.food-result .src{font-size:9px;color:var(--muted);float:right;margin-top:2px}

/* Hydration */
.hyd-ring{display:flex;align-items:center;gap:12px}
.hyd-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text)}
.hyd-target{font-size:12px;color:var(--text2)}
.hyd-quick{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.hyd-quick button{flex:1;min-width:60px;padding:6px 4px;font-size:12px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:inherit}
.hyd-quick button:hover{background:var(--surface);border-color:var(--border2)}

/* Adherence trend bar */
.adh-bar{display:flex;gap:2px;margin-top:6px}
.adh-day{flex:1;height:18px;border-radius:3px;background:var(--surface3);position:relative}
.adh-day.good{background:#1f3b27}
.adh-day.mid{background:#3d2a0b}
.adh-day.bad{background:#3e1a1a}
.adh-day.skip{background:var(--surface3);opacity:.3}

@media (min-width:480px){
  .app{padding:18px 18px}
  .nav{max-width:460px}
}
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="brand">Build</div>
    <div class="ready" id="readyChip" onclick="openReadiness()">
      <div class="ring" id="readyRing" style="background:var(--surface3);color:var(--text2)">–</div>
      <div class="lbl" id="readyLbl">log readiness</div>
    </div>
  </div>
  <div id="view"></div>
</div>

<nav class="nav">
  <div class="nav-btn active" data-tab="today" onclick="setTab('today')"><span class="ic">◐</span>Today</div>
  <div class="nav-btn" data-tab="calendar" onclick="setTab('calendar')"><span class="ic">▦</span>Calendar</div>
  <div class="nav-btn" data-tab="workout" onclick="setTab('workout')"><span class="ic">◧</span>Workout</div>
  <div class="nav-btn" data-tab="food" onclick="setTab('food')"><span class="ic">◭</span>Food</div>
  <div class="nav-btn" data-tab="report" onclick="setTab('report')"><span class="ic">◌</span>Report</div>
  <div class="nav-btn" data-tab="settings" onclick="setTab('settings')"><span class="ic">⚙</span>Settings</div>
</nav>

<div id="modal"></div>
<div id="toast"></div>

<script>
// =========================================================================
// DATE UTILITIES (LOCAL TIME — never use toISOString)
// =========================================================================
function localDateStr(d){d=d||new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseLocalDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function daysBetween(a,b){return Math.floor((a-b)/86400000);}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

// =========================================================================
// CONSTANTS
// =========================================================================
const BLOCK_START = new Date(2026,4,10);   // May 10 2026 — entry (Sun)
const WEEK1_START = new Date(2026,4,11);   // May 11 2026 — Mon, Week 1 starts

// NUTRITION DATA — Evidence-based from sports nutrition PDF
// Per-meal protein 0.25-0.4 g/kg, 4 meals/day, ~3g leucine per meal
// =========================================================================
function macroTargets(weightKg, dayType){
  // PDF-aligned g/kg targets
  const targets = {
    lift:   {pkg:2.0, ckg:4.0, fkg:1.0},   // 2.0 g/kg P, 4 g/kg C, 1 g/kg F
    run:    {pkg:1.9, ckg:7.5, fkg:0.85},  // long run / hard cardio
    hybrid: {pkg:2.1, ckg:6.0, fkg:1.05},  // lift + run same day
    rest:   {pkg:1.8, ckg:3.5, fkg:1.1}
  };
  const t = targets[dayType] || targets.rest;
  const p = Math.round(weightKg * t.pkg);
  const c = Math.round(weightKg * t.ckg);
  const f = Math.round(weightKg * t.fkg);
  const kcal = p*4 + c*4 + f*9;
  return {kcal, protein:p, carbs:c, fat:f};
}

// Day-type adjusted hydration target (ml). Base 35 ml/kg + 500 ml/training hour.
function hydrationTarget(weightKg, trainingHours) {
  return Math.round(weightKg * 35 + (trainingHours || 0) * 500);
}

// USDA FoodData Central API integration with localStorage cache.
const USDA_BASE = 'https://api.nal.usda.gov/fdc/v1';
const FOOD_CACHE_KEY = 'reconV10_foodCache';

function getFoodCache() {
  try { return JSON.parse(localStorage.getItem(FOOD_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function setFoodCache(obj) {
  try { localStorage.setItem(FOOD_CACHE_KEY, JSON.stringify(obj)); }
  catch (e) { console.warn('Food cache write failed:', e.message); }
}

// Normalize a USDA food result into our schema
function normalizeUSDAFood(item) {
  const nutrients = {};
  (item.foodNutrients || []).forEach(n => {
    const name = (n.nutrientName || n.nutrient?.name || '').toLowerCase();
    const val = +n.value || +n.amount || 0;
    if (name.includes('energy') && (n.unitName || '').toUpperCase() === 'KCAL') nutrients.kcal = val;
    else if (name.includes('protein')) nutrients.p = val;
    else if (name.includes('carbohydrate')) nutrients.c2 = val;
    else if (name.includes('total lipid') || name === 'fat') nutrients.f = val;
    else if (name.includes('fiber')) nutrients.fi = val;
    else if (name.includes('sodium')) nutrients.na = val;
  });
  return {
    i: 'usda_' + item.fdcId,
    n: item.description || 'Unknown',
    c: item.foodCategory || 'usda',
    sa: 100, su: 'g',
    k: nutrients.kcal || 0,
    p: nutrients.p || 0,
    c2: nutrients.c2 || 0,
    f: nutrients.f || 0,
    fi: nutrients.fi || 0,
    na: nutrients.na || 0,
    upf: (item.dataType === 'Branded'),
    nt: item.brandOwner || item.dataType || ''
  };
}

async function searchUSDA(query, limit = 20) {
  const key = (state.settings && state.settings.usdaApiKey) || 'DEMO_KEY';
  const url = `${USDA_BASE}/foods/search?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(query)}&pageSize=${limit}&dataType=Foundation,SR%20Legacy,Branded`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('USDA API ' + r.status);
    const data = await r.json();
    const foods = (data.foods || []).map(normalizeUSDAFood);
    // Cache each food by id for instant later lookup
    const cache = getFoodCache();
    foods.forEach(f => { cache[f.i] = f; });
    setFoodCache(cache);
    return foods;
  } catch (e) {
    console.warn('USDA search failed:', e.message);
    return [];
  }
}

// Unified search: local DB + custom foods + cached USDA + (optional) live USDA
function searchFoods(query, opts = {}) {
  const q = (query || '').toLowerCase().trim();
  if (!q) return [];
  const custom = (state.customFoods || []);
  const cached = Object.values(getFoodCache());
  const all = [...FOOD_DB, ...custom, ...cached];
  // De-duplicate by id, prefer custom > local > cached
  const byId = {};
  for (const f of all) if (!byId[f.i]) byId[f.i] = f;
  const items = Object.values(byId);
  // Score: prefix match on name > substring > category
  const scored = [];
  for (const f of items) {
    const nm = f.n.toLowerCase();
    let score = 0;
    if (nm === q) score = 100;
    else if (nm.startsWith(q)) score = 80;
    else if (nm.includes(q)) score = 60;
    else if ((f.c || '').toLowerCase().includes(q)) score = 30;
    if (score > 0) scored.push({...f, score});
  }
  return scored.sort((a,b)=>b.score-a.score).slice(0, opts.limit || 20);
}

function getFoodById(id) {
  if (id.startsWith('usda_')) return getFoodCache()[id];
  return FOOD_DB.find(f => f.i === id) || (state.customFoods||[]).find(f => f.i === id);
}

// Scale a food's macros to an arbitrary serving amount
function scaleFood(food, amount) {
  const ratio = amount / food.sa;
  return {
    kcal: +(food.k * ratio).toFixed(0),
    protein: +(food.p * ratio).toFixed(1),
    carbs: +(food.c2 * ratio).toFixed(1),
    fat: +(food.f * ratio).toFixed(1),
    fiber: +((food.fi || 0) * ratio).toFixed(1),
    sodium: +((food.na || 0) * ratio).toFixed(0),
    upf: !!food.upf
  };
}

function loadState(){
  try{
    let raw = localStorage.getItem('reconV10');
    if(!raw){
      // migrate
      for(const k of ['reconV9','reconV8','reconV7','reconV6']){
        const m = localStorage.getItem(k);
        if(m){
          localStorage.setItem('reconV10', m);
          raw = m;
          showToast('Migrated data from '+k);
          break;
        }
      }
    }
    if(raw){
      const parsed = JSON.parse(raw);
      const def = defaultState();
      // Deep-merge top-level objects so newly-added sub-fields get populated
      const merged = {...def, ...parsed};
      for (const key of Object.keys(def)) {
        if (def[key] && typeof def[key] === 'object' && !Array.isArray(def[key]) && parsed[key] && typeof parsed[key] === 'object' && !Array.isArray(parsed[key])) {
          merged[key] = {...def[key], ...parsed[key]};
        }
      }
      return merged;
    }
  }catch(e){console.error('loadState',e);}
  return defaultState();
}
function saveState(){
  try{
    localStorage.setItem('reconV10', JSON.stringify(state));
  }catch(e){
    if(e.name==='QuotaExceededError') showToast('Storage full (5MB). Export and reset.');
    console.error('saveState',e);
  }
}

// =========================================================================
// PLAN HELPERS
// =========================================================================
function currentWeekKey(today){
  today = today || new Date();
  const today0 = new Date(today.getFullYear(),today.getMonth(),today.getDate());
  if(today0 < BLOCK_START) return null;
  if(today0 < WEEK1_START) return 'entry';
  const diff = daysBetween(today0, WEEK1_START);
  const wk = Math.floor(diff/7)+1;
  if(wk<=4) return 'week'+wk;
  return null; // post block
}
function todaysPlan(today){
  today = today || new Date();
  const key = currentWeekKey(today);
  if(!key) return {past:true};
  const wk = PLAN[key];
  if(key==='entry'){
    // entry has 2 days indexed by date
    const idx = daysBetween(new Date(today.getFullYear(),today.getMonth(),today.getDate()), BLOCK_START);
    return {weekKey:key, week:wk, day:wk.days[idx], dayIdx:idx};
  }
  const dayIdx = planDayIdx(today.getDay());
  return {weekKey:key, week:wk, day:wk.days[dayIdx], dayIdx};
}
function classifyDayType(plan){
  if(!plan || !plan.day) return 'rest';
  const am = plan.day.am, pm = plan.day.pm;
  const t1 = am?.t, t2 = pm?.t;
  const hasLift = [t1,t2].some(t=>['push','pull','hsr'].includes(t));
  const hasRun  = [t1,t2].some(t=>['easy','qual','long'].includes(t));
  if(hasLift && hasRun) return 'hybrid';
  if(hasLift) return 'lift';
  if(hasRun) return 'run';
  return 'rest';
}

// 1RM (Brzycki)
// =========================================================================
function e1rm(weight,reps){if(!weight||!reps) return 0; if(reps>=37) return weight; return Math.round(weight/(1.0278-0.0278*reps));}
function suggestNextWeight(exercise, lastSets){
  // From spec: RPE-based
  if(!lastSets || !lastSets.length) return null;
  const w = +lastSets[lastSets.length-1].weight || 0;
  const avgRPE = lastSets.reduce((a,s)=>a+(+s.rpe||0),0)/lastSets.length;
  const compound = COMPOUND_LIFTS.has(exercise);
  let delta = 0, action = 'hold';
  if(avgRPE <= 6.5){ delta = compound?10:5; action='add'; }
  else if(avgRPE <= 7.5){ delta = compound?5:2.5; action='add'; }
  else if(avgRPE <= 8.5){ delta = 0; action='+1 rep'; }
  else { delta = compound?-5:-2.5; action='deload'; }
  return {weight: w+delta, action, avgRPE: avgRPE.toFixed(1)};
}

// =========================================================================
// READINESS SCORE
// =========================================================================
function readinessScore(r, rhrBaseline){
  if(!r) return null;
  let s = 0;
  // sleep hours 25 pts (7.5+ = full)
  s += Math.min(25, (r.sleepHours||0)/7.5*25);
  // sleep quality 15 pts
  s += ((r.sleepQuality||0)/10)*15;
  // inverse soreness 20
  s += (1-((r.soreness||5)/10))*20;
  // energy 20
  s += ((r.energy||5)/10)*20;
  // inverse stress 10
  s += (1-((r.stress||5)/10))*10;
  // rhr delta 10 (baseline ± 5 bpm)
  const rhrDelta = (r.rhr||rhrBaseline)-rhrBaseline;
  if(rhrDelta <= 0) s += 10;
  else if(rhrDelta <= 5) s += 10 - (rhrDelta/5)*5;
  else s += Math.max(0, 5 - (rhrDelta-5));
  return Math.round(Math.max(0,Math.min(100,s)));
}
function readinessLabel(score){
  if(score === null || score === undefined) return {l:'log',c:'var(--muted)'};
  if(score>=80) return {l:'green',c:'var(--green)'};
  if(score>=65) return {l:'normal',c:'var(--blue)'};
  if(score>=50) return {l:'caution',c:'var(--amber)'};
  return {l:'recover',c:'var(--red)'};
}

// =========================================================================
// ACWR (Acute:Chronic Workload Ratio)
// =========================================================================
function computeACWR(runs, today){
  today = today||new Date();
  const today0 = new Date(today.getFullYear(),today.getMonth(),today.getDate());
  // acute = last 7 days mileage
  // chronic = avg of last 28 days mileage
  let acute=0, chronic=0;
  for(const r of runs){
    const rd = parseLocalDate(r.date);
    const diff = daysBetween(today0, rd);
    if(diff>=0 && diff<7) acute += +r.distance||0;
    if(diff>=0 && diff<28) chronic += +r.distance||0;
  }
  chronic = chronic/4;
  const ratio = chronic ? acute/chronic : 0;
  return {acute:+acute.toFixed(1), chronic:+chronic.toFixed(1), ratio:+ratio.toFixed(2)};
}

// =========================================================================
// SLEEP DEBT (7-day)
// =========================================================================
function sleepDebt(readinessLog, today){
  today = today||new Date();
  const today0 = new Date(today.getFullYear(),today.getMonth(),today.getDate());
  let debt = 0, logged = 0;
  for(let i=0;i<7;i++){
    const d = addDays(today0,-i);
    const k = localDateStr(d);
    const r = readinessLog[k];
    if(r && r.sleepHours != null){
      debt += Math.max(0, 8 - r.sleepHours);
      logged++;
    }
  }
  return {debt:+debt.toFixed(1), logged};
}

// =========================================================================
// RACE TRAJECTORY (VDOT progression model)
// =========================================================================
function projectVDOT(baseline, weeksTrained, runs){
  // Daniels-style: a fit hybrid athlete gains roughly 0.4-0.7 VDOT/week early, slowing to 0.2/week
  // Adjust for actual training: factor in weekly mileage compliance and quality session count
  // Race day: Nov 15, today: now. Approximate weeks to race.
  const today = new Date();
  const weeksToRace = Math.max(0, Math.floor((RACE_DATE-today)/(86400000*7)));
  const weeksSinceStart = Math.max(0, Math.floor((today-BLOCK_START)/(86400000*7)));
  // simple model
  let projected = baseline + Math.min(9, weeksToRace*0.3);
  return {current:baseline, projected:+projected.toFixed(1), weeksToRace, weeksSinceStart};
}
function vdotToMarathon(vdot){
  // Daniels table approximations
  const table = {50:'3:32',51:'3:28',52:'3:24',53:'3:20',54:'3:16',55:'3:12',56:'3:08',57:'3:04',58:'3:00',59:'2:56',60:'2:53',61:'2:49',62:'2:46',63:'2:42',64:'2:39',65:'2:36'};
  const k = Math.round(vdot);
  return table[k] || (k<50?'>3:32':'<2:36');
}

// =========================================================================
// STATE MODEL — HRV/RHR rolling baseline + Daily Training State
// References: Plews et al. 2013 (rolling avg HRV more sensitive than daily),
// Kiviniemi 2007/2010 (HRV-guided training outperforms fixed plans),
// Vesterinen 2016 (HRV-guided > predefined for endurance gains)
// =========================================================================

// Get N most recent readiness entries strictly before `today`, with a given field present
function recentReadinessValues(field, today, n) {
  const dates = Object.keys(state.readiness).sort().reverse();
  const out = [];
  const todayKey = localDateStr(today);
  for (const k of dates) {
    if (k >= todayKey) continue;
    const v = state.readiness[k]?.[field];
    if (v !== undefined && v !== null && v !== '' && !isNaN(+v)) {
      out.push(+v);
      if (out.length >= n) break;
    }
  }
  return out;
}

function rollingStats(vals) {
  if (!vals.length) return {mean: null, sd: null, n: 0};
  const mean = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (vals.length < 2) return {mean, sd: null, n: vals.length};
  const variance = vals.reduce((a,b)=>a + Math.pow(b-mean,2), 0) / (vals.length - 1);
  return {mean, sd: Math.sqrt(variance), n: vals.length};
}

// Compute training state from today's readiness. Returns {color, score, drivers[], reasons[]}
function dailyTrainingState(today) {
  today = today || new Date();
  const todayKey = localDateStr(today);
  const r = state.readiness[todayKey];
  const profile = state.profile;

  // HRV rolling baseline (last 7 days, exclude today)
  const hrvHistory = recentReadinessValues('hrv', today, 7);
  const hrvStats = rollingStats(hrvHistory);
  const hrvToday = r?.hrv ? +r.hrv : null;

  // RHR rolling baseline (last 7 days)
  const rhrHistory = recentReadinessValues('rhr', today, 7);
  const rhrStats = rollingStats(rhrHistory);
  const rhrToday = r?.rhr ? +r.rhr : null;
  const rhrFallback = profile.rhr; // user-set baseline if no history

  // Readiness score from sliders (already implemented)
  const readinessScoreVal = readinessScore(r, profile.rhr);

  const drivers = []; // {label, value, status: 'good'|'caution'|'bad'}
  const reasons = []; // human-readable explanations

  // --- HRV evaluation ---
  let hrvStatus = 'unknown';
  if (hrvToday !== null && hrvStats.mean !== null) {
    const z = hrvStats.sd ? (hrvToday - hrvStats.mean) / hrvStats.sd : 0;
    drivers.push({
      label: 'HRV',
      value: `${hrvToday} ms`,
      sub: `vs ${hrvStats.mean.toFixed(0)} ± ${(hrvStats.sd||0).toFixed(0)} (7d)`,
      status: z < -1.0 ? 'bad' : z < -0.5 ? 'caution' : 'good'
    });
    if (z < -1.5) {
      hrvStatus = 'critical';
      reasons.push({lvl:'red', text:`HRV ${hrvToday}ms is ${(-z).toFixed(1)} SD below 7-day baseline (${hrvStats.mean.toFixed(0)}ms). Strong autonomic suppression — train very lightly or rest.`, cite:'Plews 2013, Vesterinen 2016'});
    } else if (z < -1.0) {
      hrvStatus = 'low';
      reasons.push({lvl:'red', text:`HRV ${hrvToday}ms is ${(-z).toFixed(1)} SD below baseline. Quality work blunted today — switch to Z2 only.`, cite:'Kiviniemi 2007'});
    } else if (z < -0.5) {
      hrvStatus = 'mild';
      reasons.push({lvl:'amber', text:`HRV mildly suppressed (${(-z).toFixed(1)} SD below baseline). Acceptable for moderate work; cap intervals.`, cite:'Vesterinen 2016'});
    } else {
      hrvStatus = 'normal';
    }
  } else if (hrvToday !== null) {
    drivers.push({label:'HRV', value:`${hrvToday} ms`, sub:'baseline building…', status:'good'});
  }

  // --- RHR evaluation ---
  let rhrStatus = 'unknown';
  if (rhrToday !== null) {
    const baseline = rhrStats.mean !== null ? rhrStats.mean : rhrFallback;
    const delta = rhrToday - baseline;
    drivers.push({
      label: 'RHR',
      value: `${rhrToday} bpm`,
      sub: `vs ${baseline.toFixed(0)} baseline`,
      status: delta >= 7 ? 'bad' : delta >= 4 ? 'caution' : 'good'
    });
    if (delta >= 7) {
      rhrStatus = 'critical';
      reasons.push({lvl:'red', text:`RHR ${rhrToday} bpm is +${delta.toFixed(0)} over baseline (${baseline.toFixed(0)}). Suggests illness onset, overreaching, or poor sleep — rest day.`, cite:'Buchheit 2014'});
    } else if (delta >= 4) {
      rhrStatus = 'elevated';
      reasons.push({lvl:'amber', text:`RHR +${delta.toFixed(0)} over baseline. Moderate stress signal — avoid high intensity.`, cite:'Buchheit 2014'});
    } else {
      rhrStatus = 'normal';
    }
  }

  // --- Subjective readiness ---
  if (readinessScoreVal !== null) {
    drivers.push({
      label: 'Subj.',
      value: `${readinessScoreVal}`,
      sub: 'sliders',
      status: readinessScoreVal >= 65 ? 'good' : readinessScoreVal >= 50 ? 'caution' : 'bad'
    });
    if (readinessScoreVal < 40) {
      reasons.push({lvl:'red', text:`Subjective readiness ${readinessScoreVal}/100 (sleep, soreness, energy, stress). Body is signaling distress.`, cite:'Saw 2016'});
    } else if (readinessScoreVal < 55) {
      reasons.push({lvl:'amber', text:`Subjective readiness ${readinessScoreVal}/100. Cap intensity.`, cite:'Saw 2016'});
    }
  }

  // --- Composite color verdict ---
  // Red if: HRV critical OR RHR critical OR readiness < 40
  // Yellow if: HRV low/mild OR RHR elevated OR readiness < 55
  // Green otherwise (or if no data, default to green w/ warning)
  let color = 'green';
  if (hrvStatus === 'critical' || rhrStatus === 'critical' || (readinessScoreVal !== null && readinessScoreVal < 40)) {
    color = 'red';
  } else if (hrvStatus === 'low' || hrvStatus === 'mild' || rhrStatus === 'elevated' || (readinessScoreVal !== null && readinessScoreVal < 55)) {
    color = 'yellow';
  }

  // Data-quality flag
  const dataQuality = (hrvToday !== null ? 1 : 0) + (rhrToday !== null ? 1 : 0) + (readinessScoreVal !== null ? 1 : 0);
  let dataNote = null;
  if (dataQuality === 0) dataNote = 'No readiness data today — log to get a real verdict.';
  else if (dataQuality === 1) dataNote = 'Limited data — verdict is approximate.';
  if (hrvStats.n < 5 && hrvToday !== null) dataNote = (dataNote || '') + ' HRV baseline still building (' + hrvStats.n + '/7 days).';

  return {
    color, drivers, reasons, dataNote,
    hrv: {today: hrvToday, ...hrvStats},
    rhr: {today: rhrToday, ...rhrStats, fallback: rhrFallback},
    readinessScore: readinessScoreVal
  };
}

// =========================================================================
// LOAD MODEL — Banister CTL / ATL / TSB
// References: Banister 1991, Coggan/TrainingPeaks PMC, Skiba 2007
// =========================================================================

// HR-TRIMP (Banister) — males: y=0.64, b=1.92; weighted intensity exponent
// Returns dimensionless training stress score
function runTRIMP(run, profile) {
  if (!run.time) return 0;
  const hr = run.hr || null;
  const hrMax = profile.maxHR || 200;
  const hrRest = profile.rhr || 50;
  let intensity;
  if (hr) {
    intensity = (hr - hrRest) / (hrMax - hrRest);
  } else if (run.pace) {
    // Pace fallback: map pace to %HR reserve using VDOT-anchored zones
    const paceMin = paceToMin(run.pace);
    // VDOT 50 easy ~ 8:30, threshold ~ 6:50, VO2 ~ 6:00
    if (paceMin >= 8.5) intensity = 0.55;
    else if (paceMin >= 7.5) intensity = 0.70;
    else if (paceMin >= 6.8) intensity = 0.82;
    else if (paceMin >= 6.0) intensity = 0.90;
    else intensity = 0.95;
  } else {
    // No HR, no pace — estimate from distance + assume easy
    intensity = 0.60;
  }
  intensity = Math.max(0.1, Math.min(1.0, intensity));
  const y = 0.64, b = 1.92;
  const trimp = run.time * intensity * y * Math.exp(b * intensity);
  return trimp;
}

// Lifting load score — sum of (sets × reps × %1RM)^0.7 with RPE multiplier
// Calibrated so a typical hard hybrid lift session ≈ 50-70 units (similar magnitude to a Z2 hour TRIMP)
function liftLoad(session, baselines) {
  if (!session?.sets?.length) return 0;
  let total = 0;
  for (const set of session.sets) {
    const reps = +set.reps || 0;
    const weight = +set.weight || 0;
    const rpe = +set.rpe || 7; // default if not logged
    if (!reps || !weight) continue;
    // Estimate %1RM via Brzycki inversion
    const e1RM = e1rm(weight, reps);
    if (e1RM <= 0) continue;
    const pct1RM = Math.min(1.0, weight / e1RM);
    // RPE multiplier: RPE 10 = 1.0, RPE 7 = 0.8, RPE 5 = 0.65
    const rpeMult = 0.5 + (rpe - 5) * 0.1;
    const setLoad = Math.pow(reps * weight * pct1RM, 0.7) * rpeMult / 10;
    total += setLoad;
  }
  return total;
}

// Per-day TSS (combined run + lift)
function dailyTSS(dateKey, profile) {
  let tss = 0;
  for (const run of state.running) {
    if (run.date === dateKey) tss += runTRIMP(run, profile);
  }
  for (const lift of state.lifting) {
    if (lift.date === dateKey) tss += liftLoad(lift, state.baselines);
  }
  return tss;
}

// Exponentially weighted moving average — Banister style
// CTL: 42-day time constant, ATL: 7-day time constant
// EWMA formula: today_avg = yesterday_avg + (today_tss - yesterday_avg) * (1 - exp(-1/tau))
function computePMC(today, daysHistory) {
  daysHistory = daysHistory || 90;
  const profile = state.profile;
  const start = addDays(today, -daysHistory);
  const series = []; // {date, tss, ctl, atl, tsb}
  let ctl = 0, atl = 0;
  const ctlAlpha = 1 - Math.exp(-1/42);
  const atlAlpha = 1 - Math.exp(-1/7);
  for (let d = new Date(start); d <= today; d = addDays(d, 1)) {
    const key = localDateStr(d);
    const tss = dailyTSS(key, profile);
    ctl = ctl + (tss - ctl) * ctlAlpha;
    atl = atl + (tss - atl) * atlAlpha;
    const tsb = ctl - atl;
    series.push({date: key, tss, ctl, atl, tsb});
  }
  const last = series[series.length-1] || {ctl:0,atl:0,tsb:0,tss:0};
  return {series, ctl: last.ctl, atl: last.atl, tsb: last.tsb, tssToday: last.tss};
}

// Forecast taper start: project flat training, find when TSB > +15 on race day
// Returns optimal taper start date (working backward from race)
function forecastTaperStart(raceDate, currentCTL, currentATL) {
  // Standard 3-week taper: 80%/60%/40% of recent volume
  // We solve: what TSB do we hit on race day if we taper starting from each candidate date?
  // Target TSB at race: +15 to +25 (Coggan recommends +20 for goal events)
  const race = parseLocalDate(raceDate);
  const today = new Date();
  const daysToRace = daysBetween(race, today);
  if (daysToRace < 7) return null;
  // Approximate avg daily TSS from CTL (CTL ~= rolling avg daily TSS)
  const avgDailyTSS = Math.max(40, currentCTL);
  // Try taper lengths from 14 to 28 days
  let best = null;
  for (let taperDays = 14; taperDays <= 28; taperDays++) {
    if (taperDays >= daysToRace) continue;
    // Simulate: normal training until taperStart, then progressive volume cut
    let ctl = currentCTL, atl = currentATL;
    const ctlAlpha = 1 - Math.exp(-1/42);
    const atlAlpha = 1 - Math.exp(-1/7);
    const taperStartIdx = daysToRace - taperDays;
    for (let d = 0; d < daysToRace; d++) {
      let dailyTss;
      if (d < taperStartIdx) {
        dailyTss = avgDailyTSS;
      } else {
        // Taper: cut linearly from 100% to 30% across taper window
        const taperFrac = (d - taperStartIdx) / taperDays;
        dailyTss = avgDailyTSS * (1 - 0.7 * taperFrac);
      }
      ctl = ctl + (dailyTss - ctl) * ctlAlpha;
      atl = atl + (dailyTss - atl) * atlAlpha;
    }
    const raceTSB = ctl - atl;
    const score = -Math.abs(raceTSB - 20); // closer to +20 is better
    if (!best || score > best.score) {
      best = {taperDays, taperStart: addDays(race, -taperDays), raceTSB, raceCTL: ctl, score};
    }
  }
  return best;
}

// =========================================================================
// MUSCLE-GROUP RECOVERY ENGINE
// Exponential return-to-fresh curve per group; freshness = 1 - load_remaining
// =========================================================================

// Compute current freshness % for each muscle group based on last 7 days
function muscleFreshness(today) {
  today = today || new Date();
  const todayKey = localDateStr(today);
  const result = {}; // {group: {freshness, lastLoad, lastDate, hoursAgo}}
  for (const [group] of MUSCLE_DISPLAY) {
    result[group] = {freshness: 1.0, lastLoad: 0, lastDate: null, hoursAgo: null, tauHrs: MUSCLE_RECOVERY_HRS[group] || 48};
  }
  // Walk last 7 days, accumulate per-group volume contributions
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    const key = localDateStr(d);
    const hoursAgo = i * 24 + (today.getHours() - 12); // approx, anchor sessions at noon
    const sessions = state.lifting.filter(s => s.date === key);
    for (const sess of sessions) {
      const exMuscles = EXERCISE_MUSCLES[sess.exercise] || {};
      // Volume for this exercise = sum of weight × reps across all sets
      let exVol = 0;
      for (const set of sess.sets) {
        exVol += (+set.weight || 0) * (+set.reps || 0);
      }
      // Normalize volume to a 0-1 "session load" scale (1 = very hard session for this group)
      // Reference: 10,000 lb-reps to a primary group = 1.0 load
      for (const [group, weight] of Object.entries(exMuscles)) {
        if (!result[group]) continue;
        const load = (exVol * weight) / 10000;
        // Apply decay
        const tau = result[group].tauHrs;
        const decayedLoad = load * Math.exp(-hoursAgo / tau);
        result[group].freshness = Math.max(0, result[group].freshness - decayedLoad);
        if (load > result[group].lastLoad || result[group].lastDate === null) {
          // Track most recent significant hit
          if (i <= 3 && load > 0.05) {
            result[group].lastLoad = load;
            result[group].lastDate = key;
            result[group].hoursAgo = hoursAgo;
          }
        }
      }
    }
  }
  for (const g of Object.keys(result)) {
    result[g].freshness = Math.max(0, Math.min(1, result[g].freshness));
  }
  return result;
}

// =========================================================================
// DECISION ENGINE — combines state model, load model, recovery, recent trends
// Returns a modified prescription with reason cards
// =========================================================================
function decideToday(today) {
  today = today || new Date();
  const todayKey = localDateStr(today);
  const plan = todaysPlan(today);
  const sessionAM = plan.day?.am;
  const sessionPM = plan.day?.pm;
  const profile = state.profile;
  const stateModel = dailyTrainingState(today);
  const pmc = computePMC(today, 60);
  const fresh = muscleFreshness(today);
  const acwr = computeACWR(state.running, today);

  // Pull recent runs (last 7d) for HR-drift check
  const weekRuns = state.running.filter(r => {
    const rd = parseLocalDate(r.date);
    return rd >= addDays(today, -7) && rd < today;
  });

  // Last lift session (for progression suggestion)
  const sortedLifts = [...state.lifting].sort((a,b) => b.date.localeCompare(a.date));
  const lastLift = sortedLifts[0];

  const rules = []; // {priority, level, action, reason, cite}
  const mods = {amIntensity: null, pmIntensity: null, mileageMult: 1.0, liftRpeCap: null, swapToZ2: false, restDay: false, paceShiftSec: 0, weightAdjust: {}};

  // RULE 1 — RHR/HRV critical → forced rest
  if (stateModel.color === 'red') {
    const criticalDriver = stateModel.drivers.find(d => d.status === 'bad');
    if (criticalDriver) {
      rules.push({priority:1, level:'red',
        action: 'Rest day or active recovery walk',
        reason: stateModel.reasons.find(r=>r.lvl==='red')?.text || 'Critical autonomic signal',
        cite: stateModel.reasons.find(r=>r.lvl==='red')?.cite});
      mods.restDay = true;
    }
  }

  // RULE 2 — ACWR > 1.5 → forced easy
  if (!mods.restDay && acwr.chronic > 0 && acwr.ratio > 1.5) {
    rules.push({priority:2, level:'red',
      action: 'Easy day regardless of plan — injury risk ceiling',
      reason: `ACWR ${acwr.ratio.toFixed(2)} > 1.5. 2-4× injury risk above this threshold.`,
      cite: 'Gabbett 2016 BJSM'});
    mods.swapToZ2 = true;
    mods.mileageMult = Math.min(mods.mileageMult, 0.7);
  }

  // RULE 3 — Sleep debt > 5h over 7d → drop quality
  const sd = sleepDebt(state.readiness, today);
  if (!mods.restDay && sd.debt > 5) {
    rules.push({priority:3, level:'amber',
      action: 'Drop quality work; hold mileage at easy pace',
      reason: `${sd.debt.toFixed(1)}h sleep debt over 7 days. Cumulative restriction performs like full deprivation past 5h.`,
      cite: 'Van Dongen 2003 Sleep'});
    if (sessionAM && /tempo|interval|threshold|vo2|hard/i.test(sessionAM.title || '')) mods.swapToZ2 = true;
  }

  // RULE 4 — Yellow state → moderate cap
  if (!mods.restDay && stateModel.color === 'yellow') {
    rules.push({priority:4, level:'amber',
      action: 'Cap intensity at Z2/moderate — no VO2 or threshold today',
      reason: stateModel.reasons.find(r=>r.lvl==='amber' || r.lvl==='red')?.text || 'State markers mildly suppressed',
      cite: stateModel.reasons[0]?.cite || 'Kiviniemi 2007'});
    if (sessionAM && /tempo|interval|threshold|vo2/i.test(sessionAM.title||'')) mods.swapToZ2 = true;
    mods.liftRpeCap = 7;
  }

  // RULE 5 — TSB deep negative → fatigue dominant
  if (!mods.restDay && pmc.tsb < -25 && pmc.ctl > 30) {
    rules.push({priority:5, level:'amber',
      action: 'Form (TSB) is deeply negative — recover before pushing again',
      reason: `TSB ${pmc.tsb.toFixed(0)} (CTL ${pmc.ctl.toFixed(0)} / ATL ${pmc.atl.toFixed(0)}). High fatigue overhang.`,
      cite: 'Banister 1991, Coggan PMC'});
    mods.mileageMult = Math.min(mods.mileageMult, 0.75);
  }

  // RULE 6 — Easy-run HR drift > 8% over week
  if (weekRuns.length >= 3) {
    const easyRuns = weekRuns.filter(r => r.hr && r.distance > 3 && r.distance < 9);
    if (easyRuns.length >= 2) {
      const recent = easyRuns.slice(0, Math.ceil(easyRuns.length/2));
      const older = easyRuns.slice(Math.ceil(easyRuns.length/2));
      const recentAvgHR = recent.reduce((a,r)=>a+r.hr,0)/recent.length;
      const olderAvgHR = older.reduce((a,r)=>a+r.hr,0)/older.length;
      const drift = (recentAvgHR - olderAvgHR) / olderAvgHR;
      if (drift > 0.08) {
        rules.push({priority:6, level:'amber',
          action: 'Slow easy runs by 10-15 sec/mi until HR drift normalizes',
          reason: `Easy-run HR has drifted +${(drift*100).toFixed(0)}% recently. Sign of accumulating fatigue or undercurrent illness.`,
          cite: 'Daniels 2014, Buchheit 2014'});
        mods.paceShiftSec = 12;
      }
    }
  }

  // RULE 7 — Muscle group not recovered for lift selection
  if (!mods.restDay && (sessionAM?.exercises || sessionPM?.exercises)) {
    const exercises = [...(sessionAM?.exercises||[]), ...(sessionPM?.exercises||[])];
    const stale = [];
    for (const ex of exercises) {
      const muscles = EXERCISE_MUSCLES[ex.name];
      if (!muscles) continue;
      for (const [group, weight] of Object.entries(muscles)) {
        if (weight >= 0.5 && fresh[group]?.freshness < 0.4 && !stale.includes(group)) {
          stale.push(group);
        }
      }
    }
    if (stale.length) {
      rules.push({priority:7, level:'amber',
        action: `Consider swapping or reducing volume — ${stale.map(g => g.replace('_',' ')).join(', ')} not fully recovered`,
        reason: `Muscle freshness < 40% (recent volume + decay curve). Hitting again may compromise adaptation.`,
        cite: 'Schoenfeld 2016/2017 frequency MA'});
    }
  }

  // RULE 8 — Last lift hit top set easily → progress
  if (lastLift && !mods.restDay && sessionAM && /lift|squat|bench|press|pull|deadlift/i.test(JSON.stringify(sessionAM))) {
    const topSet = lastLift.sets[lastLift.sets.length - 1];
    if (topSet && +topSet.rpe <= 7 && +topSet.reps >= 5) {
      const isLowerBody = /squat|deadlift|leg/i.test(lastLift.exercise);
      const bump = isLowerBody ? 5 : 2.5;
      rules.push({priority:8, level:'green',
        action: `Last ${lastLift.exercise} top set RPE ${topSet.rpe} — bump ${bump}lb next session`,
        reason: `Top set ${topSet.weight}×${topSet.reps} @ RPE ${topSet.rpe}. Reps in reserve suggest readiness to progress.`,
        cite: 'Helms 2017 RPE-based programming'});
      mods.weightAdjust[lastLift.exercise] = bump;
    } else if (topSet && (+topSet.rpe >= 9 || +topSet.reps < 3)) {
      rules.push({priority:8, level:'amber',
        action: `Hold ${lastLift.exercise} weight + cut one set next session`,
        reason: `Top set RPE ${topSet.rpe || '?'}, ${topSet.reps} reps. Indicates fatigue or stalled progression.`,
        cite: 'Helms 2017'});
      mods.weightAdjust[lastLift.exercise] = 0;
    }
  }

  // Compute final modified plan summary
  const sortedRules = rules.sort((a,b) => a.priority - b.priority);
  const verdict = mods.restDay ? 'rest'
                : sortedRules.some(r => r.level === 'red') ? 'red'
                : sortedRules.some(r => r.level === 'amber') ? 'yellow'
                : 'green';

  return {
    verdict, // 'green'|'yellow'|'red'|'rest'
    rules: sortedRules,
    mods,
    stateModel,
    pmc,
    fresh,
    acwr,
    sleepDebt: sd,
    plan,
    sessionAM,
    sessionPM
  };
}

// =========================================================================
// FUELING ENGINE — time-of-day cards based on session
// References: Kerksick 2017 ISSN nutrient timing, Burke 2011 carbs for endurance,
// Schoenfeld 2013 protein timing, Stellingwerff 2007 intra-race carb intake
// =========================================================================
function fuelingCards(today) {
  today = today || new Date();
  const todayKey = localDateStr(today);
  const plan = todaysPlan(today);
  if (!plan.day) return [];

  const profile = state.profile;
  const bwKeys = Object.keys(state.bodyweight).sort();
  const latestBW = bwKeys.length ? state.bodyweight[bwKeys[bwKeys.length-1]] : profile.weight;
  const weightKg = latestBW * 0.4536;
  const cards = [];

  const amStart = state.settings?.amSessionTime ?? 7;
  const pmStart = state.settings?.pmSessionTime ?? 17;
  const now = today.getHours() + today.getMinutes()/60;

  function timingStatus(sessionTimeHr, durationHr) {
    const hrsUntil = sessionTimeHr - now;
    const hrsSince = now - (sessionTimeHr + durationHr);
    if (hrsUntil > 0 && hrsUntil < 2) return {label:`in ${(hrsUntil*60).toFixed(0)} min`, urgency:'now'};
    if (now >= sessionTimeHr && now <= sessionTimeHr + durationHr) return {label:'during session', urgency:'now'};
    if (hrsSince > 0 && hrsSince < 1.5) return {label:`${(hrsSince*60).toFixed(0)} min post`, urgency:'now'};
    if (hrsUntil > 0) return {label:`later (${sessionTimeHr.toFixed(0)}:00)`, urgency:'later'};
    return {label:'done', urgency:'past'};
  }

  function cardsForSession(session, sessionTimeHr, label) {
    if (!session) return;
    const isLongRun = /long\s*run/i.test(session.title || '');
    const isQuality = /tempo|interval|threshold|vo2|race/i.test(session.title || '');
    const isLift = /lift|squat|bench|press|pull|deadlift|hsr/i.test((session.title||'') + JSON.stringify(session.exercises||{}));
    const durationMin = isLongRun ? 90 : isQuality ? 60 : isLift ? 60 : 45;
    const durationHr = durationMin / 60;
    const t = timingStatus(sessionTimeHr, durationHr);

    // PRE — 60-120 min before
    const carbsG = isLongRun || isQuality ? Math.round(weightKg * 1.5)
                 : isLift ? Math.round(weightKg * 0.8)
                 : Math.round(weightKg * 0.5);
    cards.push({
      title: `${label} pre-fuel · ${t.urgency==='now' ? t.label : '90 min before'}`,
      body: `${carbsG}g carbs · low fat/fiber. Oatmeal+banana, rice+honey, bagel+jam.`,
      cite: 'Burke 2011, Kerksick 2017 ISSN',
      urgency: t.urgency==='now' && (sessionTimeHr - now) > 0 && (sessionTimeHr - now) < 2 ? 'now' : 'later',
      icon: '🍌'
    });

    // CAFFEINE — 30-45 min before (if quality/lift, and not within 6h sleep)
    if (isLongRun || isQuality || isLift) {
      const sleepCutoff = 22;
      const stimSafe = sessionTimeHr + durationHr + 5 < sleepCutoff;
      if (stimSafe) {
        const caffeineMg = Math.round(weightKg * 4);
        cards.push({
          title: `${label} caffeine · 30 min before`,
          body: `${caffeineMg} mg (3-6 mg/kg). 1.5 cups coffee or 1 gel. Skip if within 6h of sleep.`,
          cite: 'Grgic 2020 caffeine meta',
          urgency: t.urgency==='now' && (sessionTimeHr - now) > 0.3 && (sessionTimeHr - now) < 0.8 ? 'now' : 'later',
          icon: '☕'
        });
      }
    }

    // INTRA — during long run or long quality
    if (isLongRun || (isQuality && durationMin > 75)) {
      cards.push({
        title: `${label} in-run fueling`,
        body: `60-90g carbs/hr. ~2-3 gels/hr (every 25-30 min), or sports drink. Start at 30 min in.`,
        cite: 'Stellingwerff 2007, Jeukendrup 2014',
        urgency: t.urgency==='now' && now >= sessionTimeHr && now <= sessionTimeHr + durationHr ? 'now' : 'later',
        icon: '🥤'
      });
    }

    // POST — within 60 min after
    const proteinG = Math.round(weightKg * 0.35);
    const postCarbsG = isLongRun || isQuality ? Math.round(weightKg * 1.0) : Math.round(weightKg * 0.5);
    cards.push({
      title: `${label} recovery · within 60 min after`,
      body: `${proteinG}g protein + ${postCarbsG}g carbs. Whey+banana, chocolate milk+bagel, chicken+rice.`,
      cite: 'Schoenfeld 2013, Kerksick 2017',
      urgency: t.urgency==='now' && now > sessionTimeHr + durationHr && now < sessionTimeHr + durationHr + 1.5 ? 'now' : t.urgency==='past' ? 'past' : 'later',
      icon: '🥛'
    });
  }

  cardsForSession(plan.day.am, amStart, 'AM');
  cardsForSession(plan.day.pm, pmStart, 'PM');

  // Whole-day macro shift
  const dayType = classifyDayType(plan);
  if (dayType === 'run' || dayType === 'hybrid') {
    cards.push({
      title: `Daily carb target · ${dayType} day`,
      body: `${Math.round(weightKg * (dayType==='hybrid'?6.5:5.5))}-${Math.round(weightKg * (dayType==='hybrid'?7.5:7))}g carbs (vs 4-5g/kg on easy/rest days).`,
      cite: 'Burke 2011 periodised CHO',
      urgency: 'now',
      icon: '🍞'
    });
  }
  return cards;
}

// =========================================================================
// DIET COACH — contextual daily fueling recommendations
// Combines: today/tomorrow/yesterday plans, current macros, time-of-day,
// session timing, sleep debt, UPF trend, phase. Returns prioritized recs.
// =========================================================================
function dietCoach(today) {
  today = today || new Date();
  const now = today.getHours() + today.getMinutes()/60;
  const todayKey = localDateStr(today);
  const tomorrowKey = localDateStr(addDays(today, 1));
  const yesterdayKey = localDateStr(addDays(today, -1));

  const todayPlan = todaysPlan(today);
  const tomorrowPlan = todaysPlan(addDays(today, 1));
  const yesterdayPlan = todaysPlan(addDays(today, -1));

  const dayType = classifyDayType(todayPlan);
  const tomorrowType = classifyDayType(tomorrowPlan);
  const yesterdayType = classifyDayType(yesterdayPlan);

  const bwKeys = Object.keys(state.bodyweight).sort();
  const latestBW = bwKeys.length ? state.bodyweight[bwKeys[bwKeys.length-1]] : state.profile.weight;
  const weightKg = latestBW * 0.4536;

  const meals = state.nutrition[todayKey]?.meals || [];
  const consumed = sumMeals(meals);
  const targets = macroTargets(weightKg, dayType);

  const amStart = state.settings?.amSessionTime ?? 7;
  const pmStart = state.settings?.pmSessionTime ?? 17;

  const recs = []; // {priority, title, body, cite, urgency}

  // --- RULE 1: Carb-load for tomorrow's hard session (afternoon/evening only) ---
  const tomorrowHard = tomorrowPlan.day && /tempo|interval|threshold|long\s*run|race|vo2/i.test(JSON.stringify(tomorrowPlan.day));
  if (tomorrowHard && now >= 14) {
    const carbTarget = Math.round(weightKg * 7);
    const remaining = carbTarget - consumed.carbs;
    if (remaining > 80) {
      recs.push({
        priority: 8,
        title: 'Carb-load for tomorrow',
        body: `Tomorrow has a quality session. Current carbs ${Math.round(consumed.carbs)}g — bump to ~${carbTarget}g tonight. Rice, pasta, potatoes, sweet potato, oats. ${Math.round(remaining)}g to go.`,
        cite: 'Burke 2011, Mujika 2010',
        icon: '🥖',
        urgency: 'soon'
      });
    }
  }

  // --- RULE 2: Pre-workout window (60-150 min before session) ---
  const sessions = [
    {time: amStart, label: 'AM', session: todayPlan.day?.am},
    {time: pmStart, label: 'PM', session: todayPlan.day?.pm}
  ];
  for (const {time, label, session} of sessions) {
    if (!session) continue;
    const hrsUntil = time - now;
    if (hrsUntil >= 0.5 && hrsUntil <= 2.5) {
      const isHard = /tempo|interval|threshold|long|squat|deadlift|hsr/i.test((session.title||'') + JSON.stringify(session.exercises||{}));
      const carbsG = Math.round(weightKg * (isHard ? 1.5 : 0.8));
      recs.push({
        priority: 10,
        title: `Pre-${label} fuel — in ${Math.round(hrsUntil*60)} min`,
        body: `${carbsG}g carbs, low fat/fiber. Oatmeal+banana, rice+honey, bagel+jam. ${isHard ? 'Quality session = lean carb-heavy' : 'Easy session = lighter portion'}.`,
        cite: 'Kerksick 2017 ISSN, Burke 2011',
        icon: '🍌',
        urgency: 'now'
      });
    }
  }

  // --- RULE 3: Post-workout window (within 90 min of session end) ---
  for (const {time, label, session} of sessions) {
    if (!session) continue;
    const isLong = /long\s*run/i.test(session.title||'');
    const isHard = /tempo|interval|threshold|long|squat|deadlift|hsr/i.test((session.title||'') + JSON.stringify(session.exercises||{}));
    const duration = isLong ? 1.5 : 1.0;
    const hrsAfter = now - (time + duration);
    if (hrsAfter > 0 && hrsAfter < 1.5) {
      const proteinG = Math.round(weightKg * 0.35);
      const carbsG = Math.round(weightKg * (isHard ? 1.0 : 0.5));
      recs.push({
        priority: 10,
        title: `Post-${label} recovery — ${Math.round(hrsAfter*60)} min after`,
        body: `${proteinG}g protein + ${carbsG}g carbs. Whey+banana, chocolate milk+bagel, chicken+rice+veg.`,
        cite: 'Schoenfeld 2013, Kerksick 2017',
        icon: '🥛',
        urgency: 'now'
      });
    }
  }

  // --- RULE 4: Protein pacing — behind ideal distribution ---
  // Protein MPS responds to 0.25-0.4 g/kg per meal, ~4 meals/day
  if (now > 9 && consumed.kcal > 200) {
    // Expected protein by now: roughly proportional to waking hours
    const expectedPct = Math.min(1, (now - 7) / 12); // assume eat 7am-7pm
    const expectedProtein = expectedPct * targets.protein;
    if (consumed.protein < expectedProtein * 0.75) {
      const behind = Math.round(expectedProtein - consumed.protein);
      const nextMealP = Math.round(weightKg * 0.35);
      recs.push({
        priority: 7,
        title: 'Protein behind pace',
        body: `${Math.round(consumed.protein)}g / ${targets.protein}g today (${behind}g behind ideal distribution). Next meal: ~${nextMealP}g protein. Chicken breast 150g (45g), cottage cheese 1.5cup (38g), 2-scoop whey (50g).`,
        cite: 'Schoenfeld 2018 — protein distribution every 3-5h, Areta 2013',
        icon: '🥩',
        urgency: 'now'
      });
    }
  }

  // --- RULE 5: Underfueling on quality day (evening check) ---
  if (dayType !== 'rest' && consumed.kcal > 500 && now > 17) {
    const kcalPct = consumed.kcal / targets.kcal;
    if (kcalPct < 0.70) {
      recs.push({
        priority: 9,
        title: '⚠️ Underfueling on a training day',
        body: `${Math.round(consumed.kcal)} / ${targets.kcal} kcal on a ${dayType} day. Chronic underfueling → suppressed T, immune drop, adaptation loss. Hit the target tonight.`,
        cite: 'Mountjoy 2023 RED-S IOC consensus, Loucks 2003',
        icon: '⚠️',
        urgency: 'now'
      });
    }
  }

  // --- RULE 6: Recovery priority after yesterday's hard session ---
  const yesterdayHard = yesterdayPlan.day && /long\s*run|tempo|interval|threshold|race/i.test(JSON.stringify(yesterdayPlan.day));
  if (yesterdayHard && now < 16) {
    const proteinTarget = Math.round(weightKg * 1.8);
    recs.push({
      priority: 6,
      title: 'Recovery day — protein priority',
      body: `Coming off hard session yesterday. Target ${proteinTarget}g protein today (1.8 g/kg) + carb replenish. MPS still elevated 24-48h post.`,
      cite: 'Burd 2011 MPS time-course, Areta 2013',
      icon: '🔄',
      urgency: now < 12 ? 'now' : 'soon'
    });
  }

  // --- RULE 7: Rest day kcal advisory ---
  if (dayType === 'rest' && now > 13) {
    if (consumed.kcal > targets.kcal * 1.15) {
      recs.push({
        priority: 4,
        title: 'Rest day calories tracking high',
        body: `${Math.round(consumed.kcal)} / ${targets.kcal} target. Recomp comes from modest deficits on rest days. Skip second portions tonight.`,
        cite: 'Helms 2014 evidence-based recomp',
        icon: '🍽️',
        urgency: 'soon'
      });
    }
  }

  // --- RULE 8: UPF trend warning ---
  let upfSum = 0, upfDays = 0;
  for (let i = 1; i <= 7; i++) {
    const k = localDateStr(addDays(today, -i));
    const dayMeals = state.nutrition[k]?.meals || [];
    if (!dayMeals.length) continue;
    const totalK = dayMeals.reduce((a,m)=>a+(+m.kcal||0), 0);
    const upfK = dayMeals.filter(m=>m.upf).reduce((a,m)=>a+(+m.kcal||0), 0);
    if (totalK > 200) { upfSum += (upfK / totalK); upfDays++; }
  }
  const avgUpfPct = upfDays > 0 ? upfSum / upfDays : 0;
  if (avgUpfPct > 0.25 && upfDays >= 4) {
    recs.push({
      priority: 3,
      title: 'Clean eating drifting',
      body: `7-day UPF average ${Math.round(avgUpfPct*100)}% of kcal (target <20%). UPF intake adds ~500 kcal/day ad libitum vs unprocessed (Hall 2019 RCT). Pick whole foods tonight.`,
      cite: 'Hall 2019 NIH metabolic ward, NOVA classification',
      icon: '🌾',
      urgency: 'normal'
    });
  }

  // --- RULE 9: Sleep debt → don't undereat ---
  const sd = sleepDebt(state.readiness, today);
  if (sd.debt > 5 && consumed.kcal > 0) {
    recs.push({
      priority: 5,
      title: 'Sleep debt — hold kcal target',
      body: `${sd.debt.toFixed(1)}h sleep debt over 7d. Sleep restriction raises cortisol AND ghrelin — undereating compounds the problem. Hit target tonight, prioritize sleep.`,
      cite: 'Spiegel 2004 leptin/ghrelin, Nedeltcheva 2010',
      icon: '😴',
      urgency: 'normal'
    });
  }

  // --- RULE 10: Hydration cross-check (afternoon only) ---
  const totalHyd = (state.hydration[todayKey]?.entries || []).reduce((a,e)=>a+(+e.ml||0), 0);
  const hydTarget = hydrationTarget(weightKg, 1);
  if (now > 14 && totalHyd < hydTarget * 0.5) {
    recs.push({
      priority: 3,
      title: 'Hydration tracking low',
      body: `${totalHyd} ml / ${hydTarget} ml today. Mild dehydration suppresses hunger cues — you may not feel hungry but still need calories. Drink ~500ml in next hour.`,
      cite: 'Cheuvront 2010, McKenzie 2016',
      icon: '💧',
      urgency: 'normal'
    });
  }

  // --- RULE 11: Pre-bed casein (lift day, evening) ---
  const liftToday = todayPlan.day && /lift|squat|bench|press|pull|deadlift|hsr/i.test(JSON.stringify(todayPlan.day));
  if (liftToday && now >= 20 && now < 23) {
    const caseinG = Math.round(weightKg * 0.4);
    recs.push({
      priority: 4,
      title: 'Pre-bed protein',
      body: `Lift day + bedtime in ~2 hr → ${caseinG}g slow-digesting protein (casein, cottage cheese, Greek yogurt). Extends MPS overnight.`,
      cite: 'Snijders 2015, Res 2012',
      icon: '🌙',
      urgency: 'soon'
    });
  }

  // --- RULE 12: Phase context (peak/race-prep adjustments) ---
  const phase = getPhase(today);
  if (phase && phase.key === 'taper' && now > 12) {
    recs.push({
      priority: 4,
      title: `Taper phase — adjust intake`,
      body: `You're tapering for the race. Volume is dropping but glycogen needs stay high. Don't cut carbs proportionally to mileage — hold at ~6-7 g/kg.`,
      cite: 'Mujika 2010 tapering, Burke 2019',
      icon: '🎯',
      urgency: 'normal'
    });
  }

  return recs.sort((a,b) => b.priority - a.priority).slice(0, 5);
}

// =========================================================================
// WORKOUT ADHERENCE (Seiler 80/20 polarized training)
// =========================================================================
// Classify a run's intensity based on HR vs zones, or pace
function classifyRunIntensity(run, profile) {
  const maxHR = profile.maxHR || 200;
  const ceilingPct = (state.settings.easyHRCeilingPct || 75) / 100;
  const floorPct = (state.settings.hardHRFloorPct || 85) / 100;
  const easyCeiling = maxHR * ceilingPct;
  const hardFloor = maxHR * floorPct;
  if (run.hr) {
    if (run.hr <= easyCeiling) return 'easy';
    if (run.hr >= hardFloor) return 'hard';
    return 'moderate';
  }
  // Fallback to pace bucketing — use VDOT-based threshold
  if (run.pace) {
    const p = paceToMin(run.pace);
    // Easy pace for VDOT 50 at altitude ~ 7:45-8:30
    if (p >= 7.5) return 'easy';
    if (p < 6.5) return 'hard';
    return 'moderate';
  }
  return 'unknown';
}

// Parse "7:32" pace string to decimal minutes
function paceToMin(s) {
  if (!s) return 0;
  const m = String(s).match(/(\d+):(\d+)/);
  if (!m) return parseFloat(s) || 0;
  return +m[1] + +m[2]/60;
}

// Compute adherence score for a given day
function computeDayAdherence(dateKey, planSession, dayLifts, dayRuns) {
  // planSession = the prescribed workout (e.g. "Long run easy", "Tempo", "Lift hard")
  // Returns {score: 0-100, prescribed, actual, reason}
  if (!planSession) return null;
  const desc = JSON.stringify(planSession).toLowerCase();
  const prescribedRun = /easy|recovery|aerobic|long run/.test(desc) ? 'easy'
                      : /tempo|threshold|interval|vo2|hard|race|strides/.test(desc) ? 'hard'
                      : null;
  let runScore = null, runActual = null, runReason = '';
  if (prescribedRun && dayRuns.length) {
    const intensities = dayRuns.map(r => classifyRunIntensity(r, state.profile));
    if (prescribedRun === 'easy') {
      const offCount = intensities.filter(i => i === 'hard' || i === 'moderate').length;
      runScore = offCount === 0 ? 100 : Math.max(40, 100 - offCount * 35);
      runActual = intensities.find(i => i === 'hard') ? 'hard'
                : intensities.find(i => i === 'moderate') ? 'moderate' : 'easy';
      if (runScore < 100) runReason = 'Easy day ran too hard — ' + dayRuns.map(r=>`HR ${r.hr||'?'} (${r.pace||'?'})`).join(', ');
    } else { // hard prescribed
      const hitHard = intensities.includes('hard');
      runScore = hitHard ? 100 : intensities.includes('moderate') ? 65 : 30;
      runActual = hitHard ? 'hard' : intensities[0] || 'unknown';
      if (runScore < 100) runReason = 'Hard day not hard enough — target HR ≥ ' + Math.round((state.profile.maxHR||200) * (state.settings.hardHRFloorPct||85)/100);
    }
  }
  // Lift adherence — prescribed RPE band roughly matched?
  const prescribedLift = /lift|squat|bench|deadlift|press|pull/.test(desc);
  let liftScore = null;
  if (prescribedLift && dayLifts.length) {
    const rpes = dayLifts.flatMap(s => +s.rpe || []).filter(Boolean);
    if (rpes.length) {
      const avgRpe = rpes.reduce((a,b)=>a+b,0)/rpes.length;
      // Quality work target RPE 7-9. Deload target 5-7.
      const deload = /deload|recovery|light/.test(desc);
      const target = deload ? [5,7] : [7,9];
      if (avgRpe >= target[0] && avgRpe <= target[1]) liftScore = 100;
      else if (avgRpe < target[0]) liftScore = Math.max(50, 100 - (target[0]-avgRpe)*15);
      else liftScore = Math.max(50, 100 - (avgRpe-target[1])*15);
    }
  }
  const scores = [runScore, liftScore].filter(s=>s!==null);
  if (!scores.length) return null;
  const score = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  return {score, prescribed: prescribedRun || (prescribedLift?'lift':'rest'), actual: runActual, reason: runReason};
}

// Weekly adherence: % of session-days where score >= 80
function weeklyAdherence(weekStart, weekEnd) {
  let total = 0, hit = 0;
  for (let d = new Date(weekStart); d <= weekEnd; d = addDays(d, 1)) {
    const key = localDateStr(d);
    const a = state.adherence[key];
    if (a && a.score !== null && a.score !== undefined) {
      total++;
      if (a.score >= 80) hit++;
    }
  }
  return total > 0 ? Math.round(hit / total * 100) : null;
}

// =========================================================================
// GAMIFICATION — streaks + 7-day consistency %
// =========================================================================
// Compute a streak count: walk backward from today until a day fails the test
function computeStreak(testFn) {
  let count = 0;
  let d = new Date();
  // Skip today if not yet evaluable (no data yet) — start from yesterday if today returns null
  for (let i = 0; i < 365; i++) {
    const key = localDateStr(d);
    const result = testFn(key, d);
    if (result === true) count++;
    else if (result === false) break;
    // null = skip day (no data yet, don't break streak but don't count)
    d = addDays(d, -1);
  }
  return count;
}

function computeAllStreaks() {
  const profile = state.profile;
  const weightKg = profile.weight * 0.4536;
  return {
    workoutLogged: computeStreak(key => {
      const ranToday = state.running.some(r => r.date === key);
      const liftedToday = state.lifting.some(s => s.date === key);
      // Today: null if no data yet; past: false if neither
      const isToday = key === localDateStr();
      if (isToday && !ranToday && !liftedToday) return null;
      return ranToday || liftedToday;
    }),
    sleep7h: computeStreak(key => {
      const r = state.readiness[key];
      if (!r) return key === localDateStr() ? null : false;
      return (+r.sleepHours || 0) >= 7;
    }),
    hydration: computeStreak(key => {
      const total = (state.hydration[key]?.entries || []).reduce((s,e)=>s+(+e.ml||0), 0);
      if (total === 0) return key === localDateStr() ? null : false;
      // Use stored daily target if logged, else compute base
      const target = hydrationTarget(weightKg, 1); // approx 1hr base
      return total >= target * 0.85;
    }),
    protein: computeStreak(key => {
      const day = state.nutrition[key];
      if (!day || !day.meals || !day.meals.length) return key === localDateStr() ? null : false;
      const totalP = day.meals.reduce((s,m)=>s+(+m.protein||0), 0);
      const target = weightKg * 1.6;
      return totalP >= target;
    }),
    cleanEating: computeStreak(key => {
      const day = state.nutrition[key];
      if (!day || !day.meals || !day.meals.length) return key === localDateStr() ? null : false;
      const totalK = day.meals.reduce((s,m)=>s+(+m.kcal||0), 0);
      const upfK = day.meals.filter(m=>m.upf).reduce((s,m)=>s+(+m.kcal||0), 0);
      if (totalK === 0) return null;
      return (upfK / totalK) < 0.20;
    })
  };
}

function consistency7Day() {
  // % of last 7 days that hit at least 3 of 5 daily targets
  let hitDays = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(new Date(), -i);
    const key = localDateStr(d);
    let hits = 0;
    if (state.running.some(r=>r.date===key) || state.lifting.some(s=>s.date===key)) hits++;
    if ((+state.readiness[key]?.sleepHours || 0) >= 7) hits++;
    const hyd = (state.hydration[key]?.entries||[]).reduce((s,e)=>s+(+e.ml||0),0);
    const weightKg = state.profile.weight * 0.4536;
    if (hyd >= hydrationTarget(weightKg, 1) * 0.85) hits++;
    const day = state.nutrition[key];
    if (day && day.meals) {
      const totalP = day.meals.reduce((s,m)=>s+(+m.protein||0), 0);
      if (totalP >= weightKg * 1.6) hits++;
      const totalK = day.meals.reduce((s,m)=>s+(+m.kcal||0), 0);
      const upfK = day.meals.filter(m=>m.upf).reduce((s,m)=>s+(+m.kcal||0), 0);
      if (totalK > 0 && (upfK/totalK) < 0.20) hits++;
    }
    if (hits >= 3) hitDays++;
  }
  return Math.round(hitDays / 7 * 100);
}

];

function getPhase(d) {
  const k = localDateStr(d);
  return PHASES.find(p => k >= p.start && k <= p.end);
}

function getWeekInPhase(d, phase) {
  const start = parseLocalDate(phase.start);
  return Math.floor(daysBetween(d, start) / 7);
}

function sessionBlock(s, ampm, dateKey, progress){
  const colorMap = {easy:'easy',qual:'qual',long:'long',push:'push',pull:'pull',hsr:'hsr',rest:'rest',cross:'cross'};
  const tagCls = colorMap[s.t]||'rest';
  return `
    <div style="margin-bottom:10px">
      <div class="row" style="gap:8px;margin-bottom:6px">
        <span class="tag ${tagCls}">${ampm} · ${s.t.toUpperCase()}</span>
        <span style="font-size:13px;font-weight:500">${s.title}</span>
      </div>
      ${s.exercises ? s.exercises.map((e,i)=>{
        const key = `${ampm}-${e.name}-${i}`;
        const done = progress[key];
        const desc = `${e.sets}×${e.reps}${e.weight?` @ ${e.weight}${typeof e.weight==='number'?'lb':''}`:''}${e.note?` · ${e.note}`:''}${e.rest?` · ${e.rest} rest`:''}`;
        return `<div class="exer ${done?'done':''}" onclick="toggleExercise('${dateKey}','${key.replace(/'/g,"\\'")}');fillWorkoutLog('${e.name.replace(/'/g,"\\'")}')">
          <div class="check"></div>
          <div class="ex-body">
            <div class="ex-title">${e.name}</div>
            <div class="ex-prescription">${desc}</div>

      }).join('') : ''}
      ${s.items && s.items.length ? `<ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--text2);line-height:1.6">${s.items.map(it=>`<li>${it}</li>`).join('')}</ul>` : ''}
    </div>
  `;
}

function macroBar(name, cur, tgt, unit, cls){
  const pct = Math.min(100, tgt?(cur/tgt*100):0);
  const overshoot = tgt && cur>tgt*1.1;
  return `<div class="macro-row">
    <div class="row between">
      <span style="color:var(--text2);font-size:11.5px">${name}</span>
      <span class="v" style="font-size:12px;color:${overshoot?'var(--amber)':'var(--text)'}">${Math.round(cur)} <span style="color:var(--text2)">/ ${tgt}${unit}</span></span>
    </div>
    <div class="bar ${overshoot?'amber':cls||''}"><div style="width:${pct}%"></div></div>
  </div>`;
}
